<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>KINTA OS v0.5</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a1a">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root{--bg:#0e1117;--panel:#171b24;--card:#202637;--text:#f4f7fb;--muted:#aeb7c7;--accent:#ff7a1a;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--blue:#38bdf8;--line:#333b4f}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:#0b0e14cc;backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;gap:12px;align-items:center;justify-content:space-between}.brand{font-weight:800;font-size:22px;color:var(--accent)}.sub{font-size:12px;color:var(--muted)}nav{display:flex;gap:8px;overflow:auto;padding:10px 12px;border-bottom:1px solid var(--line);background:#111622}button,.btn{border:0;background:var(--card);color:var(--text);border-radius:14px;padding:14px 16px;font-weight:700;font-size:15px;min-height:48px;cursor:pointer}button.active{background:var(--accent);color:#111}.wrap{padding:16px;max-width:1250px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.18)}.card h3{margin:0 0 8px;font-size:18px}.big{font-size:34px;font-weight:900}.muted{color:var(--muted)}.pill{display:inline-flex;padding:6px 10px;border-radius:999px;font-weight:800;font-size:12px;margin:2px}.green{background:#143922;color:#86efac}.yellow{background:#433b12;color:#fde68a}.red{background:#471a1a;color:#fca5a5}.blue{background:#12394a;color:#7dd3fc}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.list{display:flex;flex-direction:column;gap:10px}.item{background:#111622;border:1px solid var(--line);border-radius:14px;padding:12px}.item strong{display:block;margin-bottom:4px}input,select,textarea{width:100%;background:#0d111b;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px;margin:6px 0 10px}textarea{min-height:90px}.two{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.hide{display:none}.kitchen{height:420px;position:relative;background:linear-gradient(135deg,#111827,#1f2937);border:1px solid var(--line);border-radius:18px;overflow:hidden}.room{position:absolute;inset:28px;border:4px solid #64748b;border-radius:8px;background:#0f172a}.eq{position:absolute;border-radius:10px;border:2px solid #94a3b8;background:#334155;color:#fff;text-align:center;font-weight:900;padding-top:15px;cursor:pointer}.eq.ready{background:#14532d}.eq.watch{background:#713f12}.eq.blocked{background:#7f1d1d}.eq.delivered{background:#075985}.footer{padding:20px;color:var(--muted);text-align:center}.danger{background:#7f1d1d}.primary{background:var(--accent);color:#111}.small{font-size:13px;padding:9px 11px;min-height:36px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.notice{border-left:4px solid var(--accent);padding:10px 12px;background:#1b1f2b;border-radius:10px;margin:12px 0}@media (max-width:760px){.big{font-size:28px}nav button{font-size:14px;white-space:nowrap}.wrap{padding:12px}.kitchen{height:360px}}
</style>
</head>
<body>
<header><div><div class="brand">KINTA OS</div><div class="sub">v0.5 Adaptive PM Brain · iPad-first PWA</div></div><button class="small" onclick="exportData()">Export Backup</button></header>
<nav id="nav"></nav>
<main class="wrap" id="app"></main>
<div class="footer">KINTA v0.5 · Adaptive PM brain prototype. Data saves on this iPad/browser only. Export backups often.</div>
<script>
const seed={projects:[{id:'P1',name:'Wylie / Live Nation Pittsburgh',phase:'Startup Readiness',health:'Watch',next:'Bova return / hood commissioning readiness',city:'Pittsburgh, PA'},{id:'P2',name:'Galaxy',phase:'ANSUL / Commissioning',health:'Needs Attention',next:'Architect response to Fire Marshal questions',city:'Austin, TX'}],equipment:[{id:'E1',project:'P1',item:'H-101',name:'Accurex Hood System',mfr:'Accurex',model:'TBD',serial:'',status:'Blocked',startup:'Not Ready',area:'Kitchen',issue:'Commissioning checklist and ANSUL coordination pending'},{id:'E2',project:'P1',item:'WI-201',name:'Walk-in Cooler / Freezer',mfr:'American Panel',model:'TBD',serial:'',status:'Watch',startup:'Pending',area:'Walk-ins',issue:'Panels/equipment setting coordination with Bova'},{id:'E3',project:'P2',item:'ANS-1',name:'ANSUL System',mfr:'Ansul',model:'TBD',serial:'',status:'Blocked',startup:'Not Ready',area:'Kitchen Hood',issue:'Fire Marshal questions awaiting architect response'},{id:'E4',project:'P2',item:'O-CTP10',name:'Alto-Shaam Combi',mfr:'Alto-Shaam',model:'CTP10E',serial:'',status:'Watch',startup:'Pending',area:'Cookline',issue:'Verify ANSUL coverage / startup prerequisites'}],decisions:[{id:'D1',project:'P1',priority:'High',title:'Confirm Bova return sequencing before remaining trades',waiting:'Bova / GC',impact:'Avoid remobilization and utility connection confusion',status:'Open'},{id:'D2',project:'P2',priority:'Critical',title:'Get architect response for Fire Marshal ANSUL questions',waiting:'Architect / GC',impact:'Blocks ANSUL completion and pre-test',status:'Open'}],startups:[{id:'S1',project:'P1',item:'H-101',name:'Accurex Hood Commissioning',score:45,status:'Blocked',blocker:'Checklist / ANSUL readiness'},{id:'S2',project:'P2',item:'ANS-1',name:'ANSUL Pre-Test',score:55,status:'Blocked',blocker:'Architect answer to Fire Marshal'}],forgotten:[{id:'F1',project:'P1',title:'Bring Accurex touchscreen cover blank for trip',trigger:'Before travel',risk:'Could require another trip or field fabrication',status:'Watch'},{id:'F2',project:'P1',title:'Capture serial plates before startup/turnover',trigger:'Startup readiness',risk:'Warranty and ASA requests later',status:'Watch'},{id:'F3',project:'P2',title:'Get written AHJ/architect answer before scheduling ANSUL final',trigger:'ANSUL schedule',risk:'Failed inspection or wasted mobilization',status:'Critical'}],missions:[{id:'M1',name:'Wylie / Galaxy Travel Mission',dates:'Sunday–Week',status:'Planning',bring:'Cover plate, PPE, iPad, drawings, startup forms',capture:'Serial numbers, startup photos, utility readiness, open punch'}],tasks:[{id:'T1',project:'P1',title:'Send GC/Bova startup readiness confirmation',due:'Today',owner:'Rick',status:'Open',priority:'Critical'},{id:'T2',project:'P1',title:'Verify Accurex checklist items within TriMark scope',due:'Today',owner:'Rick',status:'Open',priority:'High'},{id:'T3',project:'P2',title:'Get architect answer for Fire Marshal ANSUL questions',due:'Today',owner:'GC / Architect',status:'Waiting',priority:'Critical'},{id:'T4',project:'P1',title:'Capture serial plate photos during startup walk',due:'Next Site Visit',owner:'Rick',status:'Open',priority:'High'}],docs:[{id:'DOC1',project:'P1',name:'Accurex Hood Commissioning Readiness Checklist',type:'Startup Checklist',status:'Needed for scheduling',where:'Upload/link later'},{id:'DOC2',project:'P1',name:'Equipment Installation & Commissioning Schedule',type:'Schedule',status:'Active',where:'GitHub/local data for now'},{id:'DOC3',project:'P2',name:'ANSUL Fire Marshal Question Log',type:'AHJ / RFI',status:'Waiting on architect',where:'Track in decisions'}],notes:[]};
let db=JSON.parse(localStorage.getItem('kinta_v05')||localStorage.getItem('kinta_v04')||localStorage.getItem('kinta_v03')||'null')||seed;
function upgrade05(){db.memory=db.memory||[{id:'MEM1',project:'P1',title:'Wylie startup sequence',source:'Stored project knowledge',lesson:'Hood commissioning cannot be scheduled until checklist and trade readiness are confirmed in writing.',use:'Use before scheduling Accurex or ANSUL.'},{id:'MEM2',project:'P2',title:'Galaxy ANSUL blocker',source:'Meeting note',lesson:'Architect response to Fire Marshal question blocks ANSUL completion and pre-test.',use:'Escalate until written answer is received.'}];db.savings=db.savings||[{id:'SAVE1',project:'P1',idea:'Confirm all utilities are ON before startup tech mobilizes',value:'Avoid wasted trip / remobilization cost',status:'Recommended'},{id:'SAVE2',project:'P1',idea:'Capture serial plates in one field pass',value:'Avoid warranty delays and repeated site visits',status:'Recommended'},{id:'SAVE3',project:'P2',idea:'Do not schedule ANSUL final until AHJ question is closed',value:'Avoid failed inspection and re-test',status:'Critical'}];db.meetings=db.meetings||[{id:'MTG1',project:'P1',name:'Wylie Startup / Hood Readiness',time:'Next coordination call',prep:'Open blockers, owner due dates, trade readiness, checklist items, inspection countdown'},{id:'MTG2',project:'P2',name:'Galaxy GC + Trades',time:'Next meeting',prep:'Architect answer, Fire Marshal issue, ANSUL install/pre-test, hood commissioning path'}];db.warranty=db.warranty||[{id:'WAR1',project:'P1',title:'Startup documentation baseline',status:'Build now',note:'Collect serial numbers, startup forms, photos, training signoffs, and ASA contacts before turnover.'},{id:'WAR2',project:'P2',title:'ANSUL / hood acceptance record',status:'Open',note:'Keep written proof of AHJ answers, pre-test, final, and commissioning results.'}];}
upgrade05();function save(){localStorage.setItem('kinta_v05',JSON.stringify(db));}
const tabs=['Mission Control','Daily Brief','Projects','Tasks','Equipment','Startup','Decisions','Documents','Forgotten','Mission Planner','Digital Kitchen','Brain','Memory Trail','Money Saver','Meeting Prep','Warranty','Data'];let current='Mission Control';
function nav(){document.getElementById('nav').innerHTML=tabs.map(t=>`<button class="${t==current?'active':''}" onclick="current='${t}';render();">${t}</button>`).join('')}
function badge(v){let c=v=='Critical'||v=='Needs Attention'||v=='Blocked'?'red':v=='High'||v=='Watch'||v=='Planning'||v=='Pending'?'yellow':v=='Ready'||v=='Healthy'||v=='Completed'?'green':'blue';return `<span class="pill ${c}">${v}</span>`}
function pid(id){return (db.projects.find(p=>p.id==id)||{}).name||id}
function render(){nav();let a=document.getElementById('app'); if(current=='Mission Control') return a.innerHTML=mission(); if(current=='Daily Brief') return a.innerHTML=dailyBrief(); if(current=='Projects')return a.innerHTML=projects(); if(current=='Tasks')return a.innerHTML=tasks(); if(current=='Equipment')return a.innerHTML=equipment(); if(current=='Startup')return a.innerHTML=startup(); if(current=='Decisions')return a.innerHTML=decisions(); if(current=='Documents')return a.innerHTML=documents(); if(current=='Forgotten')return a.innerHTML=forgotten(); if(current=='Mission Planner')return a.innerHTML=missions(); if(current=='Digital Kitchen')return a.innerHTML=kitchen(); if(current=='Brain')return a.innerHTML=brain(); if(current=='Memory Trail')return a.innerHTML=memoryTrail(); if(current=='Money Saver')return a.innerHTML=moneySaver(); if(current=='Meeting Prep')return a.innerHTML=meetingPrep(); if(current=='Warranty')return a.innerHTML=warranty(); if(current=='Data')return a.innerHTML=dataPage();}
function mission(){let critical=db.decisions.filter(d=>d.priority=='Critical'||d.priority=='High').length;let blocked=db.startups.filter(s=>s.status=='Blocked').length;let forg=db.forgotten.filter(f=>f.status=='Critical'||f.status=='Watch').length;return `<h1>Mission Control</h1><div class="notice">v0.5 is the first adaptive PM brain. Open this first each morning, work red/yellow cards, then use Daily Brief and Tasks to drive the day.</div><div class="grid"><div class="card"><h3>Open Decisions</h3><div class="big">${db.decisions.length}</div><div>${critical} high/critical</div></div><div class="card"><h3>Startup Blockers</h3><div class="big">${blocked}</div><div>Need readiness review</div></div><div class="card"><h3>Forgotten Watch</h3><div class="big">${forg}</div><div>Things likely to bite later</div></div><div class="card"><h3>Active Projects</h3><div class="big">${db.projects.length}</div><div>Wylie / Galaxy loaded</div></div></div><h2>Top Work Today</h2><div class="grid">${db.decisions.slice(0,3).map(d=>`<div class="card"><h3>${d.title}</h3>${badge(d.priority)}<p class="muted">${pid(d.project)}</p><p>${d.impact}</p><p><b>Waiting:</b> ${d.waiting}</p></div>`).join('')}</div><h2>Startup Risk</h2><div class="list">${db.startups.map(s=>`<div class="item"><strong>${s.name}</strong>${badge(s.status)} <span class="pill blue">${s.score}% Ready</span><div class="muted">${pid(s.project)} · ${s.blocker}</div></div>`).join('')}</div>`}

function dailyBrief(){let criticalTasks=(db.tasks||[]).filter(t=>t.priority=='Critical'&&t.status!='Done');let highTasks=(db.tasks||[]).filter(t=>t.priority=='High'&&t.status!='Done');let blockers=db.startups.filter(s=>s.status=='Blocked');return `<h1>Daily Brief</h1><div class="notice"><b>Morning use:</b> read top risks, pick the first 3 tasks, then update statuses at 4:00 PM.</div><div class="grid"><div class="card"><h3>Critical Tasks</h3><div class="big">${criticalTasks.length}</div></div><div class="card"><h3>High Tasks</h3><div class="big">${highTasks.length}</div></div><div class="card"><h3>Startup Blockers</h3><div class="big">${blockers.length}</div></div><div class="card"><h3>Active Docs</h3><div class="big">${(db.docs||[]).length}</div></div></div><h2>Do First</h2><div class="list">${[...criticalTasks,...highTasks].slice(0,5).map(t=>`<div class="item"><strong>${t.title}</strong>${badge(t.priority)} ${badge(t.status)}<div class="muted">${pid(t.project)} · Due: ${t.due} · Owner: ${t.owner}</div><button class="small" onclick="taskDone('${t.id}')">Mark Done</button></div>`).join('')||'<div class="item">No urgent tasks loaded.</div>'}</div><h2>AI PM Notes</h2><div class="grid"><div class="card"><h3>Biggest Risk</h3><p>Startup and ANSUL dates can slip if readiness is not confirmed in writing before techs are scheduled.</p></div><div class="card"><h3>Best Next Move</h3><p>Use Decisions + Tasks to force each blocker into: owner, due date, written response, impact.</p></div></div>`}
function tasks(){return `<h1>Task Board</h1><div class="toolbar"><button class="primary" onclick="addTask()">Add Task</button></div><div class="grid">${['Critical','High','Normal'].map(p=>`<div class="card"><h3>${p}</h3><div class="list">${(db.tasks||[]).filter(t=>t.priority==p&&t.status!='Done').map(t=>`<div class="item"><strong>${t.title}</strong>${badge(t.status)}<div class="muted">${pid(t.project)} · ${t.due} · ${t.owner}</div><button class="small" onclick="taskDone('${t.id}')">Done</button></div>`).join('')||'<div class="muted">None</div>'}</div></div>`).join('')}</div><h2>Completed</h2><div class="list">${(db.tasks||[]).filter(t=>t.status=='Done').map(t=>`<div class="item"><strong>${t.title}</strong>${badge('Completed')}<div class="muted">${pid(t.project)}</div></div>`).join('')||'<div class="item">No completed tasks yet.</div>'}</div>`}
function documents(){return `<h1>Document Center</h1><div class="toolbar"><button class="primary" onclick="addDoc()">Add Document Record</button></div><div class="notice">v0.4 tracks what document is needed and why. v0.5 can add real file upload/linking and drawing/photo registers.</div><div class="grid">${(db.docs||[]).map(d=>`<div class="card"><h3>${d.name}</h3>${badge(d.status.includes('Waiting')?'Watch':d.status.includes('Needed')?'High':'Ready')}<p class="muted">${pid(d.project)} · ${d.type}</p><p><b>Where:</b> ${d.where}</p></div>`).join('')}</div>`}
function taskDone(id){let t=(db.tasks||[]).find(x=>x.id==id);if(t){t.status='Done';save();render();}}
function addTask(){let title=prompt('Task?');if(!title)return;db.tasks=db.tasks||[];db.tasks.push({id:'T'+Date.now(),project:db.projects[0]?.id||'',title,due:'Today',owner:'Rick',status:'Open',priority:'High'});save();render()}
function addDoc(){let name=prompt('Document name?');if(!name)return;db.docs=db.docs||[];db.docs.push({id:'DOC'+Date.now(),project:db.projects[0]?.id||'',name,type:'Document',status:'Needed',where:'Add link/location'});save();render()}

function projects(){return `<h1>Projects</h1><div class="toolbar"><button class="primary" onclick="addProject()">Add Project</button></div><div class="grid">${db.projects.map(p=>`<div class="card"><h3>${p.name}</h3>${badge(p.health)} ${badge(p.phase)}<p>${p.city}</p><p><b>Next:</b> ${p.next}</p><button class="small" onclick="openProject('${p.id}')">Command Center</button></div>`).join('')}</div>`}
function openProject(id){let p=db.projects.find(x=>x.id==id);let eq=db.equipment.filter(e=>e.project==id);let dec=db.decisions.filter(d=>d.project==id);let st=db.startups.filter(s=>s.project==id);document.getElementById('app').innerHTML=`<button class="small" onclick="render()">← Back</button><h1>${p.name}</h1><div class="grid"><div class="card"><h3>Health</h3>${badge(p.health)}<p>${p.phase}</p></div><div class="card"><h3>Equipment</h3><div class="big">${eq.length}</div></div><div class="card"><h3>Decisions</h3><div class="big">${dec.length}</div></div><div class="card"><h3>Startups</h3><div class="big">${st.length}</div></div></div><h2>Next Milestone</h2><div class="card">${p.next}</div><h2>Open Decisions</h2><div class="list">${dec.map(d=>`<div class="item"><strong>${d.title}</strong>${badge(d.priority)}<div>${d.impact}</div></div>`).join('')||'<div class="item">None</div>'}</div>`}
function equipment(){return `<h1>Equipment</h1><div class="toolbar"><button class="primary" onclick="addEquipment()">Add Equipment</button></div><div class="grid">${db.equipment.map(e=>`<div class="card"><h3>${e.item} · ${e.name}</h3>${badge(e.status)} ${badge(e.startup)}<p class="muted">${pid(e.project)} · ${e.area}</p><p><b>${e.mfr}</b> ${e.model}</p><p>${e.issue}</p><button class="small" onclick="passport('${e.id}')">Open Passport</button></div>`).join('')}</div>`}
function passport(id){let e=db.equipment.find(x=>x.id==id);document.getElementById('app').innerHTML=`<button class="small" onclick="render()">← Back</button><h1>Equipment Passport</h1><div class="card"><h2>${e.item} · ${e.name}</h2>${badge(e.status)} ${badge(e.startup)}<div class="two"><div><b>Project</b><br>${pid(e.project)}</div><div><b>Area</b><br>${e.area}</div><div><b>Manufacturer</b><br>${e.mfr}</div><div><b>Model</b><br>${e.model}</div><div><b>Serial</b><br>${e.serial||'Missing'}</div><div><b>Open Issue</b><br>${e.issue}</div></div></div><div class="grid"><div class="card"><h3>Photos</h3><p class="muted">v0.4 will add photo upload fields.</p></div><div class="card"><h3>Startup</h3><p>${e.startup}</p></div><div class="card"><h3>Documents</h3><p class="muted">Manuals, POs, PODs, startup forms.</p></div></div>`}
function startup(){return `<h1>Startup Center</h1><div class="grid">${db.startups.map(s=>`<div class="card"><h3>${s.name}</h3><div class="big">${s.score}%</div>${badge(s.status)}<p class="muted">${pid(s.project)} · ${s.item}</p><p><b>Blocker:</b> ${s.blocker}</p></div>`).join('')}</div>`}
function decisions(){return `<h1>Decision Center</h1><div class="toolbar"><button class="primary" onclick="addDecision()">Add Decision</button></div><div class="list">${db.decisions.map(d=>`<div class="item"><strong>${d.title}</strong>${badge(d.priority)} ${badge(d.status)}<div class="muted">${pid(d.project)} · Waiting on ${d.waiting}</div><p>${d.impact}</p></div>`).join('')}</div>`}
function forgotten(){return `<h1>Forgotten Things Engine</h1><div class="notice">These are not normal tasks. They are things that tend to get missed when travel, startup, delivery, or trade pressure is high.</div><div class="list">${db.forgotten.map(f=>`<div class="item"><strong>${f.title}</strong>${badge(f.status)}<div class="muted">${pid(f.project)} · Trigger: ${f.trigger}</div><p><b>Risk:</b> ${f.risk}</p></div>`).join('')}</div>`}
function missions(){return `<h1>Mission Planner</h1><div class="grid">${db.missions.map(m=>`<div class="card"><h3>${m.name}</h3>${badge(m.status)}<p><b>Dates:</b> ${m.dates}</p><p><b>Bring:</b> ${m.bring}</p><p><b>Capture:</b> ${m.capture}</p></div>`).join('')}</div>`}
function kitchen(){return `<h1>Digital Kitchen MVP</h1><div class="notice">Tap equipment blocks to open passports. v0.4 can add more realistic floor plan layout.</div><div class="kitchen"><div class="room"></div><div class="eq blocked" style="left:13%;top:18%;width:170px;height:80px" onclick="passport('E1')">H-101<br>HOOD</div><div class="eq watch" style="left:15%;top:58%;width:145px;height:90px" onclick="passport('E2')">WI-201<br>WALK-IN</div><div class="eq blocked" style="left:58%;top:20%;width:155px;height:80px" onclick="passport('E3')">ANS-1<br>ANSUL</div><div class="eq watch" style="left:56%;top:58%;width:160px;height:85px" onclick="passport('E4')">O-CTP10<br>COMBI</div></div>`}
function brain(){return `<h1>KINTA Brain Scan</h1><button class="primary" onclick="runBrain()">Run Brain Scan</button><div id="brainout" class="grid" style="margin-top:14px"></div>`}
function runBrain(){let out=[];db.startups.filter(s=>s.status=='Blocked').forEach(s=>out.push(['Startup Risk',`${s.name} is blocked: ${s.blocker}`,'Act Today']));db.forgotten.filter(f=>f.status=='Critical').forEach(f=>out.push(['Forgotten Critical',f.title,'Act Now']));db.decisions.filter(d=>d.priority=='Critical'||d.priority=='High').forEach(d=>out.push(['Decision',d.title,'Review']));document.getElementById('brainout').innerHTML=out.map(x=>`<div class="card"><h3>${x[0]}</h3>${badge(x[2])}<p>${x[1]}</p></div>`).join('')||'<div class="card">No critical items found.</div>'}
function dataPage(){return `<h1>Data / Backup</h1><div class="grid"><div class="card"><h3>Export</h3><p>Copy/download your data backup.</p><button class="primary" onclick="exportData()">Export JSON</button></div><div class="card"><h3>Import</h3><textarea id="importBox" placeholder="Paste backup JSON here"></textarea><button onclick="importData()">Import Backup</button></div><div class="card"><h3>Reset Demo</h3><p>Restore sample Wylie/Galaxy data.</p><button class="danger" onclick="if(confirm('Reset all local data?')){db=seed;save();render()}">Reset</button></div></div>`}
function addProject(){let n=prompt('Project name?');if(!n)return;db.projects.push({id:'P'+Date.now(),name:n,phase:'Planning',health:'Watch',next:'Define next milestone',city:''});save();render()}
function addEquipment(){let item=prompt('Item number?');if(!item)return;db.equipment.push({id:'E'+Date.now(),project:db.projects[0]?.id||'',item,name:'New Equipment',mfr:'',model:'',serial:'',status:'Watch',startup:'Pending',area:'',issue:'New item needs details'});save();render()}
function addDecision(){let title=prompt('Decision needed?');if(!title)return;db.decisions.push({id:'D'+Date.now(),project:db.projects[0]?.id||'',priority:'High',title,waiting:'TBD',impact:'Needs review',status:'Open'});save();render()}
function exportData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='kinta_backup_v05.json';a.click();URL.revokeObjectURL(url)}
function importData(){try{db=JSON.parse(document.getElementById('importBox').value);save();render();alert('Imported.')}catch(e){alert('Could not import JSON.')}}

function memoryTrail(){return `<h1>Memory Trail</h1><div class="notice">v0.5 starts giving every recommendation a reason trail: what happened, where it came from, and how to use it.</div><div class="toolbar"><button class="primary" onclick="addMemory()">Add Memory</button></div><div class="list">${(db.memory||[]).map(m=>`<div class="item"><strong>${m.title}</strong><div class="muted">${pid(m.project)} · ${m.source}</div><p><b>Lesson:</b> ${m.lesson}</p><p><b>Use:</b> ${m.use}</p></div>`).join('')}</div>`}
function moneySaver(){return `<h1>Money Saver</h1><div class="notice">This screen catches choices that can prevent wasted trips, remobilization, failed inspections, missing warranty info, and repeated field work.</div><div class="toolbar"><button class="primary" onclick="addSaving()">Add Saving Idea</button></div><div class="grid">${(db.savings||[]).map(s=>`<div class="card"><h3>${s.idea}</h3>${badge(s.status=='Critical'?'Critical':'High')}<p class="muted">${pid(s.project)}</p><p><b>Value:</b> ${s.value}</p></div>`).join('')}</div>`}
function meetingPrep(){return `<h1>Meeting Prep</h1><div class="notice">Open this before every GC/OAC/startup call. It turns project data into talking points.</div><div class="grid">${(db.meetings||[]).map(m=>`<div class="card"><h3>${m.name}</h3>${badge('Planning')}<p class="muted">${pid(m.project)} · ${m.time}</p><p>${m.prep}</p><h4>Bring Up</h4><ul><li>Open blockers and who owns each one</li><li>Startup/inspection dates at risk</li><li>Written answers needed today</li><li>Photos or documents still missing</li></ul></div>`).join('')}</div>`}
function warranty(){return `<h1>Warranty / Closeout</h1><div class="notice">v0.5 starts the turnover record early so you are not rebuilding history after the project is live.</div><div class="toolbar"><button class="primary" onclick="addWarranty()">Add Closeout Item</button></div><div class="list">${(db.warranty||[]).map(w=>`<div class="item"><strong>${w.title}</strong>${badge(w.status.includes('Open')?'Watch':'High')}<div class="muted">${pid(w.project)} · ${w.status}</div><p>${w.note}</p></div>`).join('')}</div>`}
function addMemory(){let title=prompt('Memory title?');if(!title)return;db.memory=db.memory||[];db.memory.push({id:'MEM'+Date.now(),project:db.projects[0]?.id||'',title,source:'Manual entry',lesson:'Add lesson learned',use:'Use on similar project'});save();render()}
function addSaving(){let idea=prompt('Money saving / mistake prevention idea?');if(!idea)return;db.savings=db.savings||[];db.savings.push({id:'SAVE'+Date.now(),project:db.projects[0]?.id||'',idea,value:'Avoid waste / rework',status:'Recommended'});save();render()}
function addWarranty(){let title=prompt('Closeout or warranty item?');if(!title)return;db.warranty=db.warranty||[];db.warranty.push({id:'WAR'+Date.now(),project:db.projects[0]?.id||'',title,status:'Open',note:'Needs documentation'});save();render()}

render();
</script>
</body>
</html>
