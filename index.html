<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1220"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png"><title>KINTA Enterprise Alpha 6</title><style>
:root{--bg:#07101e;--panel:#121d31;--panel2:#182741;--line:#2c3f62;--text:#eef6ff;--muted:#9fb2ce;--a:#67e8f9;--g:#42d392;--w:#fbbf24;--b:#fb7185;--r:18px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#193a68,#07101e 42%,#05070c);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}button,input,select,textarea{font:inherit}button{border:0;border-radius:12px;padding:10px 12px;background:var(--a);color:#05101d;font-weight:850}button.secondary{background:#22324f;color:var(--text);border:1px solid var(--line)}button.danger{background:var(--b);color:white}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{padding:18px;border-right:1px solid var(--line);background:rgba(5,9,16,.92);position:sticky;top:0;height:100vh}.brand{font-size:22px;font-weight:950}.ver{font-size:12px;color:var(--a);margin-top:4px}.nav{display:grid;gap:8px;margin-top:20px}.nav button{text-align:left;background:transparent;color:var(--muted);border:1px solid transparent}.nav button.active,.nav button:hover{background:var(--panel2);border-color:var(--line);color:var(--text)}.main{padding:20px;max-width:1500px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.title h1{margin:0;font-size:28px}.title p{margin:4px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:linear-gradient(180deg,rgba(24,39,65,.96),rgba(18,29,49,.96));border:1px solid var(--line);border-radius:var(--r);box-shadow:0 18px 55px rgba(0,0,0,.32);padding:16px}.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}.metric{font-size:32px;font-weight:950}.small,.label{color:var(--muted);font-size:13px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.list{display:grid;gap:10px}.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(8,13,23,.48)}.item b{display:block;margin-bottom:4px}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 8px;color:var(--muted);font-size:12px}.good{color:var(--g)}.warn{color:var(--w)}.bad{color:var(--b)}input,select,textarea{width:100%;background:#091426;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:10px}textarea{min-height:90px}.form{display:grid;gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.four{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.plan{height:420px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(135deg,#14213a,#07101e);position:relative;overflow:hidden}.equipTag{position:absolute;border:1px solid var(--a);background:rgba(103,232,249,.13);color:white;border-radius:12px;padding:7px;min-width:76px;text-align:center}.k3d{height:420px;perspective:900px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#1b3152,#07101e);border-radius:16px;border:1px solid var(--line)}.room{position:relative;width:520px;height:300px;transform:rotateX(58deg) rotateZ(-33deg);transform-style:preserve-3d;background:#1c2d49;border:2px solid #456080}.block{position:absolute;background:#67e8f922;border:1px solid var(--a);border-radius:8px;padding:8px;transform:translateZ(28px);color:white;font-weight:900}.drawer{position:fixed;right:-460px;top:0;width:450px;max-width:95vw;height:100vh;background:#07101e;border-left:1px solid var(--line);box-shadow:0 18px 55px rgba(0,0,0,.5);transition:.2s;z-index:10;padding:18px;overflow:auto}.drawer.open{right:0}.timeline{border-left:2px solid var(--line);padding-left:14px}.event{margin:0 0 12px;position:relative}.event:before{content:"";position:absolute;left:-21px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--a)}.hide{display:none}.check{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:start}.check input{width:auto;margin-top:3px}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.nav{grid-template-columns:repeat(2,1fr)}.span3,.span4,.span5,.span6,.span7,.span8,.span12{grid-column:span 12}.two,.three,.four{grid-template-columns:1fr}.top{display:block}.main{padding:12px}.plan,.k3d{height:360px}}
</style></head><body><div class="app"><aside class="side"><div class="brand">KINTA OS</div><div class="ver">Enterprise Alpha 6 • v2.6-alpha</div><div id="nav" class="nav"></div><div style="position:absolute;bottom:18px;left:18px;right:18px" class="small">Guided demo + delivery + clearance controls.</div></aside><main class="main"><div class="top"><div class="title"><h1 id="pageTitle"></h1><p id="pageSub"></p></div><div class="row"><button onclick="show('risk')">Risk Scan</button><button class="secondary" onclick="exportData()">Backup</button><button class="secondary" onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" class="hide" type="file" accept="application/json" onchange="importData(event)"></div></div><div id="content"></div></main></div><aside id="drawer" class="drawer"></aside><script>
const VERSION='2.6-alpha';
const tabs=[['dashboard','Command'],['demo','User Demo'],['projects','Projects'],['tasks','Tasks'],['equipment','Equipment'],['kitchen','2D / 3D'],['clearance','Clearance'],['delivery','Delivery'],['startup','Startup'],['field','Field'],['issues','Issues'],['risk','Risk Scan'],['reports','Reports'],['settings','Settings']];
const defaultChecklist=['Equipment set in final location','Plumbing complete','Electrical complete','Gas complete if required','Water filtration installed if required','Drain connected','ANSUL/fire ready if under hood','Manufacturer startup scheduled','Startup complete','Training/turnover complete'];
const seed={projects:[{id:'p1',name:'Wylie - Live Nation Pittsburgh',status:'Active',health:'At Risk',next:'Confirm hood checklist, Bova return, startup readiness, and delivery access',date:'2026-08-05'},{id:'p2',name:'Galaxy',status:'Active',health:'Blocked',next:'Architect answer for Fire Marshal / ANSUL',date:'2026-07-15'}],equipment:[{id:'e1',project:'p1',item:'1054',name:'Accurex Hood System',type:'Hood',status:'Startup Pending',trade:'Electrical/Fire',dims:'Large assembled sections',width:96,depth:60,height:30,weight:900,level:'Level 3',access:'Hoist',large:true,crane:false,clearanceStatus:'Verify Route',deliveryStatus:'Pending',damageStatus:'Unknown',photoNotes:'Need photos of receiving, hood cabinet, and ANSUL bottle area.',route:'Confirm hoist path, ceiling clearance, turn radius, and wall protection.',x:12,y:18,w:116,h:58,history:['Installed','Power/checklist pending'],checklist:{}},{id:'e2',project:'p1',item:'WI-1',name:'Walk-in Cooler/Freezer',type:'Refrigeration',status:'Panels Pending',trade:'Bova/Fazio',dims:'Panels and doors',width:72,depth:96,height:96,weight:1200,level:'Level 3',access:'Hoist/Elevator',large:true,crane:false,clearanceStatus:'At Risk',deliveryStatus:'Partial Received',damageStatus:'Check Photos',photoNotes:'Need photos of top panels, door panels, cam locks, and missing trim.',route:'Confirm panels fit through doors/elevator and can be staged by level.',x:48,y:52,w:126,h:70,history:['Delivered','Partially set','Top panels pending'],checklist:{}},{id:'e3',project:'p1',item:'RC-1',name:'Rooftop Compressor',type:'Refrigeration',status:'Logistics Needed',trade:'Fazio/GC',dims:'Rooftop condensing unit',width:46,depth:38,height:36,weight:420,level:'Roof',access:'Crane',large:true,crane:true,clearanceStatus:'Crane Required',deliveryStatus:'Pending',damageStatus:'Unknown',photoNotes:'Need nameplate, packaging, rigging point, and roof location photos.',route:'Crane plan, street access, roof set location, permit/window, weather watch.',x:72,y:12,w:110,h:58,history:['Created logistics placeholder'],checklist:{}},{id:'e4',project:'p1',item:'RAT-1',name:'Rational Combi',type:'Cooking',status:'Utility Coordination',trade:'Plumbing/Electrical',dims:'Carted cooking equipment',width:43,depth:40,height:70,weight:350,level:'Level 3',access:'Elevator',large:false,crane:false,clearanceStatus:'OK Pending Field Check',deliveryStatus:'Received',damageStatus:'No Damage Noted',photoNotes:'Need rear connection photos and final set photo.',route:'Confirm elevator and door path with casters/stand.',x:67,y:20,w:92,h:62,history:['Delivered','Set under hood','Gas/water pending'],checklist:{}}],tasks:[{id:'t1',project:'p1',title:'Return Accurex commissioning checklist',due:'2026-07-10',owner:'Rick',status:'Open',priority:'High'},{id:'t2',project:'p1',title:'Verify large item access route by level',due:'2026-07-11',owner:'GC / Bova',status:'Open',priority:'High'},{id:'t3',project:'p2',title:'Follow up on Fire Marshal questions',due:'2026-07-10',owner:'GC/Architect',status:'Blocked',priority:'High'}],issues:[{id:'i1',project:'p1',title:'ANSUL bottle location verification',owner:'Summit/GC',status:'Open',risk:'High'}],notes:[],attachments:[],briefs:[]};
let db=JSON.parse(localStorage.getItem('kintaAlpha5')||localStorage.getItem('kintaAlpha3')||localStorage.getItem('kintaAlpha')||'null')||seed;normalize();save();
function normalize(){db.projects=db.projects||[];db.equipment=(db.equipment||[]).map(e=>Object.assign({width:0,depth:0,height:0,weight:0,level:'',access:'Door',large:false,crane:false,clearanceStatus:'Not Checked',deliveryStatus:'Pending',damageStatus:'Unknown',photoNotes:'',route:'',checklist:{},history:['Created in KINTA']},e));db.tasks=db.tasks||[];db.issues=db.issues||[];db.notes=db.notes||[];db.attachments=db.attachments||[];}
function save(){localStorage.setItem('kintaAlpha5',JSON.stringify(db));localStorage.setItem('kintaAlpha',JSON.stringify(db));}
function $(id){return document.getElementById(id)}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function cls(s){return /block|risk|overdue|high|crane|missing|damage|at risk/i.test(s)?'bad':/pending|open|coord|waiting|verify|partial|unknown/i.test(s)?'warn':'good'}function projectName(id){return (db.projects.find(p=>p.id==id)||{}).name||'No project'}function equipName(id){let e=db.equipment.find(x=>x.id==id);return e?e.item+' • '+e.name:'General'}function projectOptions(){return db.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}function equipOptions(){return db.equipment.map(e=>`<option value="${e.id}">${esc(e.item+' • '+e.name)}</option>`).join('')}
function nav(){ $('nav').innerHTML=tabs.map(t=>`<button id="nav_${t[0]}" onclick="show('${t[0]}')">${t[1]}</button>`).join('');}nav();
function show(t){tabs.forEach(x=>$('nav_'+x[0]).classList.toggle('active',x[0]==t));let names=Object.fromEntries(tabs);$('pageTitle').textContent=names[t];$('pageSub').textContent={dashboard:'Daily PM command center.',demo:'Sketch presentation for new users: what KINTA does and how to use it.',clearance:'Door / elevator / hoist / crane clearance controls.',delivery:'Receiving, damage, missing item, and photo check-in.',risk:'Auto scan for logistics, startup, delivery, and blocker risks.'}[t]||'';location.hash=t;render(t)}
function render(t){let c=$('content'); if(t=='dashboard')c.innerHTML=dashboard(); if(t=='demo')c.innerHTML=demo(); if(t=='projects')c.innerHTML=formProject()+listProjects(); if(t=='tasks')c.innerHTML=formTask()+listTasks(); if(t=='equipment')c.innerHTML=formEquip()+listEquip(); if(t=='kitchen')c.innerHTML=kitchen(); if(t=='clearance')c.innerHTML=clearance(); if(t=='delivery')c.innerHTML=delivery(); if(t=='startup')c.innerHTML=startup(); if(t=='field')c.innerHTML=field(); if(t=='issues')c.innerHTML=formIssue()+listIssues(); if(t=='risk')c.innerHTML=risk(); if(t=='reports')c.innerHTML=reports(); if(t=='settings')c.innerHTML=settings();}
function metrics(){return `<div class="grid"><div class="card span3"><div class="metric">${db.projects.length}</div><div class="label">Projects</div></div><div class="card span3"><div class="metric">${db.equipment.filter(e=>e.large).length}</div><div class="label">Large Items</div></div><div class="card span3"><div class="metric">${db.equipment.filter(e=>e.crane||/crane/i.test(e.access)).length}</div><div class="label">Crane Watch</div></div><div class="card span3"><div class="metric">${db.equipment.filter(e=>/missing|damage|partial|unknown|pending/i.test(e.deliveryStatus+' '+e.damageStatus)).length}</div><div class="label">Delivery Watch</div></div></div>`}
function dashboard(){return metrics()+`<div class="grid" style="margin-top:14px"><div class="card span6"><h3>Today’s PM Focus</h3><div class="list">${db.tasks.filter(t=>t.status!='Closed').slice(0,6).map(t=>`<div class="item"><b>${esc(t.title)}</b><span class="pill ${cls(t.priority)}">${esc(t.priority)}</span> <span class="pill ${cls(t.status)}">${esc(t.status)}</span><div class="small">${esc(projectName(t.project))} • ${esc(t.owner)} • ${esc(t.due||'No date')}</div></div>`).join('')}</div></div><div class="card span6"><h3>Logistics Watch</h3><div class="list">${db.equipment.filter(e=>e.large||e.crane||/verify|risk|crane/i.test(e.clearanceStatus)).map(e=>logisticsCard(e)).join('')}</div></div><div class="card span12"><h3>Next Best Actions</h3><div class="list">${riskItems().slice(0,8).map(r=>`<div class="item"><b class="${cls(r.level)}">${esc(r.level)}</b>${esc(r.text)}</div>`).join('')}</div></div></div>`}
function logisticsCard(e){return `<div class="item" onclick="openEquip('${e.id}')"><b>${esc(e.item)} • ${esc(e.name)}</b><span class="pill ${cls(e.clearanceStatus)}">${esc(e.clearanceStatus)}</span> <span class="pill">${esc(e.access)}</span> <span class="pill">${esc(e.level)}</span><div class="small">${esc(e.route||'No route note')}</div></div>`}

function demo(){const slides=[
['1. Command Center','Open KINTA each morning to see projects, open tasks, blocked items, startup gaps, delivery risks, and clearance risks in one place.','Start here before checking email. It tells you what can bite you today.'],
['2. Project Workspaces','Each project stores its own tasks, equipment, issues, notes, startup status, delivery records, and build history.','Use one workspace for Wylie, Galaxy, or any future project.'],
['3. Equipment Digital Twins','Every item can have dimensions, trade owner, startup checklist, delivery status, damage notes, route notes, warranty notes, and history.','Tap an item number in the 2D/3D kitchen to open the record.'],
['4. Clearance Check','KINTA flags oversized equipment that may not fit through doors or may need elevator, hoist, or crane planning.','Use this before deliveries so large items do not get stuck at the dock, stair, door, elevator, or roof.'],
['5. Delivery Mode','During unloading, mark items received, partial, missing, damaged, or photo-needed. Add notes for packing slip, damage, staging, and missing pieces.','Use this like a receiving checklist on the iPad.'],
['6. Startup & Commissioning','Track utility readiness, manufacturer startup, hood/ANSUL dependencies, training, and turnover requirements by equipment item.','This helps prevent startup delays caused by missing gas, water, electrical, drain, fire, or checklist items.'],
['7. Field Mode','Take quick notes by project and equipment item. Dictate what happened on site, who owns the next action, and what needs follow-up.','This becomes your memory trail.'],
['8. Reports & Risk Scan','Generate a copy/paste daily report and run a risk scan for blockers, large items, delivery issues, and startup gaps.','Use it for GC updates, owner updates, and internal follow-up.']
];return `<div class="grid"><div class="card span12"><h2>New User Sketch Presentation</h2><p class="small">This is a built-in walkthrough so anyone opening KINTA can understand the app without being part of the build.</p><div class="row"><button onclick="demoPrint()">Create Copy/Paste Demo Script</button><button class="secondary" onclick="show('dashboard')">Go to Command Center</button></div></div>${slides.map((s,i)=>`<div class="card span6"><div class="pill">Slide ${i+1}</div><h3>${s[0]}</h3><p>${s[1]}</p><div class="item"><b>How to use it</b>${s[2]}</div></div>`).join('')}<div class="card span12"><h3>Suggested 2-Minute Training Flow</h3><div class="list"><div class="item"><b>Step 1</b>Open Command Center and review risks.</div><div class="item"><b>Step 2</b>Open Equipment and tap an item to see the digital twin.</div><div class="item"><b>Step 3</b>Open Clearance before deliveries to confirm route, elevator, hoist, or crane needs.</div><div class="item"><b>Step 4</b>Open Delivery Mode during truck unload to check items in and record damage/missing notes.</div><div class="item"><b>Step 5</b>Open Reports to copy a daily update.</div></div></div></div>`}
function demoPrint(){const txt=`KINTA USER DEMO SCRIPT\n\nKINTA is a project operating system for commercial kitchen project management.\n\n1. Command Center: start here each morning to see project health, tasks, risks, delivery watch, and startup gaps.\n2. Projects: create a project workspace for each job.\n3. Equipment: each item becomes a digital twin with dimensions, status, trade owner, delivery, startup, warranty, and history.\n4. 2D / 3D Kitchen: tap equipment on the plan or mock kitchen to open the item record.\n5. Clearance: flag large items that may need door, elevator, hoist, or crane planning.\n6. Delivery: check in received, partial, missing, or damaged items and add photo notes.\n7. Startup: track utilities, ANSUL/fire readiness, manufacturer startup, training, and turnover.\n8. Field: save quick site notes tied to projects or equipment.\n9. Risk Scan: find blockers before they become schedule problems.\n10. Reports: copy a daily update for GC, owner, or internal team.\n\nBest daily use: open KINTA, run Risk Scan, update Delivery/Clearance/Startup, then copy the Daily Report.`;let w=window.open('','_blank');w.document.write('<pre style="white-space:pre-wrap;font:16px -apple-system;padding:20px">'+esc(txt)+'</pre>')}

function formProject(){return `<div class="card"><h3>Add Project</h3><div class="form three"><input id="pn" placeholder="Project name"><input id="ps" placeholder="Status"><input id="ph" placeholder="Health"><input id="pd" type="date"><input id="px" placeholder="Next action"><button onclick="addProject()">Add Project</button></div></div>`}function addProject(){db.projects.push({id:'p'+Date.now(),name:$('pn').value,status:$('ps').value,health:$('ph').value,next:$('px').value,date:$('pd').value});save();show('projects')}function listProjects(){return `<div class="grid" style="margin-top:14px">${db.projects.map(p=>`<div class="card span6"><h3>${esc(p.name)}</h3><span class="pill ${cls(p.health)}">${esc(p.health)}</span> <span class="pill">${esc(p.status)}</span><p>${esc(p.next)}</p><div class="small">Milestone: ${esc(p.date||'TBD')}</div></div>`).join('')}</div>`}
function formTask(){return `<div class="card"><h3>Add Follow-up</h3><div class="form four"><select id="tp">${projectOptions()}</select><input id="tt" placeholder="Task"><input id="to" placeholder="Owner"><input id="td" type="date"><select id="tpri"><option>High</option><option>Medium</option><option>Low</option></select><select id="ts"><option>Open</option><option>Blocked</option><option>Waiting</option><option>Closed</option></select><button onclick="addTask()">Add Task</button></div></div>`}function addTask(){db.tasks.unshift({id:'t'+Date.now(),project:$('tp').value,title:$('tt').value,owner:$('to').value,due:$('td').value,priority:$('tpri').value,status:$('ts').value});save();show('tasks')}function listTasks(){return `<div class="grid" style="margin-top:14px">${db.tasks.map(t=>`<div class="card span4"><h3>${esc(t.title)}</h3><span class="pill ${cls(t.priority)}">${esc(t.priority)}</span> <span class="pill ${cls(t.status)}">${esc(t.status)}</span><p>${esc(projectName(t.project))}</p><div class="small">Owner: ${esc(t.owner||'TBD')} • Due: ${esc(t.due||'TBD')}</div><div class="row" style="margin-top:10px"><button class="secondary" onclick="closeTask('${t.id}')">Close</button><button class="danger" onclick="del('tasks','${t.id}','tasks')">Delete</button></div></div>`).join('')}</div>`}function closeTask(id){let t=db.tasks.find(x=>x.id==id);if(t)t.status='Closed';save();show('tasks')}function del(k,id,tab){db[k]=db[k].filter(x=>x.id!=id);save();show(tab)}
function formEquip(){return `<div class="card"><h3>Add Equipment Twin</h3><div class="form four"><select id="ep">${projectOptions()}</select><input id="ei" placeholder="Item #"><input id="en" placeholder="Equipment name"><input id="et" placeholder="Type"><input id="ew" type="number" placeholder="Width in."><input id="ed" type="number" placeholder="Depth in."><input id="eh" type="number" placeholder="Height in."><input id="ewe" type="number" placeholder="Weight lb"><input id="elv" placeholder="Level / area"><select id="ea"><option>Door</option><option>Elevator</option><option>Hoist</option><option>Hoist/Elevator</option><option>Crane</option></select><input id="etr" placeholder="Responsible trade"><button onclick="addEquip()">Add Equipment</button></div></div>`}function addEquip(){let w=+$('ew').value,d=+$('ed').value,h=+$('eh').value,we=+$('ewe').value,access=$('ea').value;let large=(w>36||d>36||h>84||we>300||/hoist|crane/i.test(access));db.equipment.push({id:'e'+Date.now(),project:$('ep').value,item:$('ei').value,name:$('en').value,type:$('et').value,status:'New',trade:$('etr').value,width:w,depth:d,height:h,weight:we,level:$('elv').value,access,large,crane:/crane/i.test(access),clearanceStatus:large?'Verify Route':'OK Pending Field Check',deliveryStatus:'Pending',damageStatus:'Unknown',photoNotes:'',route:'',x:20+Math.random()*55,y:20+Math.random()*50,w:96,h:58,history:['Created in KINTA'],checklist:{}});save();show('equipment')}function listEquip(){return `<div class="grid" style="margin-top:14px">${db.equipment.map(e=>`<div class="card span4" onclick="openEquip('${e.id}')"><h3>${esc(e.item)} • ${esc(e.name)}</h3><span class="pill ${cls(e.status)}">${esc(e.status)}</span> <span class="pill ${e.large?'warn':'good'}">${e.large?'Large Item':'Standard'}</span><p>${esc(projectName(e.project))}</p><div class="small">${esc(e.width)}x${esc(e.depth)}x${esc(e.height)} in • ${esc(e.weight)} lb • ${esc(e.access)}</div></div>`).join('')}</div>`}
function kitchen(){return `<div class="grid"><div class="card span6"><h3>2D Plan View</h3><div class="plan">${db.equipment.map(e=>`<button class="equipTag" style="left:${e.x}%;top:${e.y}%;width:${e.w}px;height:${e.h}px" onclick="openEquip('${e.id}')">${esc(e.item)}<br><span class="small">${esc(e.type)}</span></button>`).join('')}</div></div><div class="card span6"><h3>3D Mock Kitchen</h3><div class="k3d"><div class="room">${db.equipment.map((e,i)=>`<button class="block" style="left:${35+(i%3)*145}px;top:${55+(i%2)*120}px;width:112px;height:72px" onclick="openEquip('${e.id}')">${esc(e.item)}</button>`).join('')}</div></div></div></div>`}
function openEquip(id){let e=db.equipment.find(x=>x.id==id);let checks=defaultChecklist.map(ch=>`<label class="check"><input type="checkbox" ${e.checklist[ch]?'checked':''} onchange="toggleCheck('${id}',this.dataset.ch,this.checked)" data-ch="${esc(ch)}"><span>${esc(ch)}</span></label>`).join('');let d=$('drawer');d.classList.add('open');d.innerHTML=`<button class="secondary" onclick="$('drawer').classList.remove('open')">Close</button><h2>${esc(e.item)} • ${esc(e.name)}</h2><p><span class="pill ${cls(e.status)}">${esc(e.status)}</span> <span class="pill ${e.large?'warn':'good'}">${e.large?'Large Item':'Standard'}</span> <span class="pill ${cls(e.clearanceStatus)}">${esc(e.clearanceStatus)}</span></p><p>${esc(projectName(e.project))}</p><h3>Clearance / Logistics</h3><div class="two"><input id="dw" type="number" value="${esc(e.width)}" placeholder="Width"><input id="dd" type="number" value="${esc(e.depth)}" placeholder="Depth"><input id="dh" type="number" value="${esc(e.height)}" placeholder="Height"><input id="dwe" type="number" value="${esc(e.weight)}" placeholder="Weight"></div><div class="two" style="margin-top:10px"><input id="dl" value="${esc(e.level)}" placeholder="Level"><select id="da"><option ${e.access=='Door'?'selected':''}>Door</option><option ${e.access=='Elevator'?'selected':''}>Elevator</option><option ${e.access=='Hoist'?'selected':''}>Hoist</option><option ${e.access=='Hoist/Elevator'?'selected':''}>Hoist/Elevator</option><option ${e.access=='Crane'?'selected':''}>Crane</option></select></div><textarea id="dr" placeholder="Route notes">${esc(e.route)}</textarea><select id="dcs"><option ${e.clearanceStatus=='OK Pending Field Check'?'selected':''}>OK Pending Field Check</option><option ${e.clearanceStatus=='Verify Route'?'selected':''}>Verify Route</option><option ${e.clearanceStatus=='At Risk'?'selected':''}>At Risk</option><option ${e.clearanceStatus=='Crane Required'?'selected':''}>Crane Required</option><option ${e.clearanceStatus=='Approved'?'selected':''}>Approved</option></select><button onclick="saveLogistics('${id}')">Save Logistics</button><h3>Delivery Check-In</h3><select id="dds"><option ${e.deliveryStatus=='Pending'?'selected':''}>Pending</option><option ${e.deliveryStatus=='Received'?'selected':''}>Received</option><option ${e.deliveryStatus=='Partial Received'?'selected':''}>Partial Received</option><option ${e.deliveryStatus=='Missing'?'selected':''}>Missing</option></select><select id="ddam"><option ${e.damageStatus=='Unknown'?'selected':''}>Unknown</option><option ${e.damageStatus=='No Damage Noted'?'selected':''}>No Damage Noted</option><option ${e.damageStatus=='Check Photos'?'selected':''}>Check Photos</option><option ${e.damageStatus=='Damaged'?'selected':''}>Damaged</option></select><textarea id="dpn" placeholder="Photo notes / damage notes / missing parts">${esc(e.photoNotes)}</textarea><button onclick="saveDelivery('${id}')">Save Delivery</button><h3>Startup Checklist</h3><div class="list">${checks}</div><h3>Build History</h3><div class="timeline">${e.history.map(h=>`<div class="event"><b>${esc(h)}</b></div>`).join('')}</div><textarea id="hist" placeholder="Add build history event..."></textarea><button onclick="addHist('${id}')">Add Event</button>`}
function saveLogistics(id){let e=db.equipment.find(x=>x.id==id);Object.assign(e,{width:+$('dw').value,depth:+$('dd').value,height:+$('dh').value,weight:+$('dwe').value,level:$('dl').value,access:$('da').value,route:$('dr').value,clearanceStatus:$('dcs').value});e.large=e.width>36||e.depth>36||e.height>84||e.weight>300||/hoist|crane/i.test(e.access);e.crane=/crane/i.test(e.access)||e.clearanceStatus=='Crane Required';e.history.push('Logistics updated: '+e.clearanceStatus+' via '+e.access);save();openEquip(id)}function saveDelivery(id){let e=db.equipment.find(x=>x.id==id);Object.assign(e,{deliveryStatus:$('dds').value,damageStatus:$('ddam').value,photoNotes:$('dpn').value});e.history.push('Delivery updated: '+e.deliveryStatus+' / '+e.damageStatus);save();openEquip(id)}function toggleCheck(id,ch,v){let e=db.equipment.find(x=>x.id==id);e.checklist[ch]=v;e.history.push((v?'Completed: ':'Reopened: ')+ch);save()}function addHist(id){let e=db.equipment.find(x=>x.id==id);if($('hist').value)e.history.push($('hist').value);save();openEquip(id)}
function clearance(){return `<div class="grid"><div class="card span12"><h3>Clearance / Access Register</h3><p class="small">Large item trigger: width/depth over 36 in, height over 84 in, weight over 300 lb, hoist, elevator concern, or crane access.</p><div class="list">${db.equipment.map(e=>`<div class="item" onclick="openEquip('${e.id}')"><b>${esc(e.item)} • ${esc(e.name)}</b><span class="pill ${e.large?'warn':'good'}">${e.large?'Large Item':'Standard'}</span> <span class="pill ${cls(e.clearanceStatus)}">${esc(e.clearanceStatus)}</span> <span class="pill">${esc(e.access)}</span> <span class="pill">${esc(e.level)}</span><div class="small">${esc(e.width)}x${esc(e.depth)}x${esc(e.height)} in • ${esc(e.weight)} lb</div><div class="small">${esc(e.route||'No route entered')}</div></div>`).join('')}</div></div></div>`}
function delivery(){return `<div class="grid"><div class="card span12"><h3>Delivery Mode</h3><p class="small">Use this during truck unload: tap each item, mark received/partial/missing, damage status, and photo notes.</p><div class="list">${db.equipment.map(e=>`<div class="item" onclick="openEquip('${e.id}')"><b>${esc(e.item)} • ${esc(e.name)}</b><span class="pill ${cls(e.deliveryStatus)}">${esc(e.deliveryStatus)}</span> <span class="pill ${cls(e.damageStatus)}">${esc(e.damageStatus)}</span><div class="small">Photo notes: ${esc(e.photoNotes||'None yet')}</div></div>`).join('')}</div></div></div>`}
function startup(){return `<div class="grid"><div class="card span12"><h3>Startup Checklist by Equipment</h3><div class="list">${db.equipment.map(e=>{let done=defaultChecklist.filter(x=>e.checklist[x]).length;return `<div class="item row"><b style="min-width:220px">${esc(e.item)} ${esc(e.name)}</b><span class="pill ${done==defaultChecklist.length?'good':'warn'}">${done}/${defaultChecklist.length}</span><span class="pill ${cls(e.status)}">${esc(e.status)}</span><button class="secondary" onclick="openEquip('${e.id}')">Open</button></div>`}).join('')}</div></div></div>`}
function field(){return `<div class="grid"><div class="card span5"><h3>Quick Field Note</h3><div class="form"><select id="np">${projectOptions()}</select><select id="ne"><option value="">General project note</option>${equipOptions()}</select><textarea id="nt" placeholder="Voice dictate or type field note..."></textarea><button onclick="addNote()">Save Note</button></div></div><div class="card span7"><h3>Field Notes</h3><div class="list">${db.notes.map(n=>`<div class="item"><b>${esc(projectName(n.project))}</b>${esc(n.text)}<div class="small">${esc(n.date)} • ${esc(equipName(n.equip))}</div></div>`).join('')}</div></div></div>`}function addNote(){db.notes.unshift({id:'n'+Date.now(),project:$('np').value,equip:$('ne').value,text:$('nt').value,date:new Date().toLocaleString()});save();show('field')}
function formIssue(){return `<div class="card"><h3>Add Issue</h3><div class="form three"><select id="ip">${projectOptions()}</select><input id="it" placeholder="Issue / blocker"><input id="io" placeholder="Owner"><select id="ir"><option>High</option><option>Medium</option><option>Low</option></select><button onclick="addIssue()">Add Issue</button></div></div>`}function addIssue(){db.issues.unshift({id:'i'+Date.now(),project:$('ip').value,title:$('it').value,owner:$('io').value,status:'Open',risk:$('ir').value});save();show('issues')}function listIssues(){return `<div class="grid" style="margin-top:14px">${db.issues.map(i=>`<div class="card span6"><h3>${esc(i.title)}</h3><span class="pill ${cls(i.risk)}">${esc(i.risk)}</span><p>Owner: ${esc(i.owner)}</p><div class="small">${esc(projectName(i.project))} • ${esc(i.status)}</div></div>`).join('')}</div>`}
function riskItems(){let r=[];db.tasks.filter(t=>/Blocked|Open|Waiting/.test(t.status)&&t.priority=='High').forEach(t=>r.push({level:'High',text:`Task needs action: ${t.title} | ${projectName(t.project)} | owner ${t.owner||'TBD'}`}));db.equipment.filter(e=>e.large&&/verify|risk|not checked|pending/i.test(e.clearanceStatus)).forEach(e=>r.push({level:'High',text:`Clearance check required for ${e.item} ${e.name}: ${e.width}x${e.depth}x${e.height} in, ${e.weight} lb, ${e.access}, ${e.level}`}));db.equipment.filter(e=>e.crane||/crane/i.test(e.access+e.clearanceStatus)).forEach(e=>r.push({level:'High',text:`Crane planning trigger: ${e.item} ${e.name}. Confirm crane window, roof access, street/permit restrictions, rigging path, and weather.`}));db.equipment.filter(e=>/missing|partial|pending/i.test(e.deliveryStatus)).forEach(e=>r.push({level:'Medium',text:`Delivery watch: ${e.item} ${e.name} is ${e.deliveryStatus}. Verify receiving photos and packing slip.`}));db.equipment.filter(e=>/damage|check photos|unknown/i.test(e.damageStatus)).forEach(e=>r.push({level:'Medium',text:`Damage/photo check: ${e.item} ${e.name} status is ${e.damageStatus}. Take photos before unboxing or setting.`}));db.equipment.forEach(e=>{let done=defaultChecklist.filter(x=>e.checklist[x]).length;if(done<defaultChecklist.length&&/startup|utility|pending/i.test(e.status))r.push({level:'Medium',text:`Startup gap: ${e.item} ${e.name} checklist is ${done}/${defaultChecklist.length}.`})});return r.length?r:[{level:'Good',text:'No major risks found from current local data.'}]}
function risk(){return `<div class="grid">${metrics()}<div class="card span12"><h3>KINTA Risk Scan</h3><div class="list">${riskItems().map(x=>`<div class="item"><b class="${cls(x.level)}">${esc(x.level)}</b>${esc(x.text)}</div>`).join('')}</div></div></div>`}
function briefText(){return `KINTA DAILY BRIEF\n\nHIGH PRIORITY\n${db.tasks.filter(t=>t.status!='Closed').map(t=>'- '+t.title+' | '+projectName(t.project)+' | '+t.owner+' | due '+(t.due||'TBD')).join('\n')}\n\nCLEARANCE / LOGISTICS WATCH\n${db.equipment.filter(e=>e.large||e.crane).map(e=>'- '+e.item+' '+e.name+' | '+e.width+'x'+e.depth+'x'+e.height+' in | '+e.weight+' lb | '+e.access+' | '+e.clearanceStatus).join('\n')}\n\nDELIVERY WATCH\n${db.equipment.map(e=>'- '+e.item+' '+e.name+' | delivery '+e.deliveryStatus+' | damage '+e.damageStatus+' | photos: '+(e.photoNotes||'none')).join('\n')}\n\nRISKS\n${riskItems().map(r=>'- '+r.level+': '+r.text).join('\n')}`}function reports(){return `<div class="card"><h3>Copy/Paste Daily Report</h3><textarea id="reportBox" style="min-height:440px">${esc(briefText())}</textarea><button onclick="navigator.clipboard&&navigator.clipboard.writeText($('reportBox').value)">Copy Report</button></div>`}
function settings(){return metrics()+`<div class="grid" style="margin-top:14px"><div class="card span12"><h3>KINTA Enterprise Alpha 6</h3><p>Professional alpha with built-in new user demo/sketch presentation, plus clearance checks, delivery receiving, photo notes, missing/damage tracking, startup tracking, and risk scanning.</p><div class="row"><button onclick="exportData()">Download Backup</button><button class="danger" onclick="if(confirm('Clear local KINTA data?')){localStorage.removeItem('kintaAlpha5');localStorage.removeItem('kintaAlpha');location.reload()}">Reset Local Data</button></div></div></div>`}
function exportData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kinta-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click()}function importData(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);normalize();save();show('dashboard')};r.readAsText(f)}
show(location.hash.replace('#','')||'dashboard');if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script></body></html>
