<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f766e"><link rel="manifest" href="manifest.json"><title>KINTA OS v1.0</title><style>
:root{--bg:#07111f;--panel:#0d1b2f;--panel2:#12243c;--line:#25405f;--text:#eaf2ff;--muted:#9fb2c8;--accent:#14b8a6;--warn:#f59e0b;--bad:#ef4444;--ok:#22c55e}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial;background:radial-gradient(circle at top left,#12345a,#07111f 45%,#020617);color:var(--text)}button,input,select,textarea{font:inherit}button{background:linear-gradient(135deg,#14b8a6,#0f766e);border:0;color:white;border-radius:12px;padding:10px 12px;font-weight:700}button.secondary{background:#162943;border:1px solid var(--line)}button.danger{background:#7f1d1d}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:rgba(5,12,24,.92);border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh}.brand{font-size:24px;font-weight:900;letter-spacing:.5px}.ver{color:var(--accent);font-weight:800;margin-bottom:18px}.nav button{width:100%;margin:5px 0;text-align:left;background:transparent;border:1px solid transparent;color:var(--muted)}.nav button.active,.nav button:hover{background:#10233a;color:var(--text);border-color:var(--line)}main{padding:20px;max-width:1500px}.top{display:flex;gap:12px;justify-content:space-between;align-items:center;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(13,27,47,.88);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.22)}.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}h1,h2,h3{margin:.2rem 0 .7rem}p{color:var(--muted)}.kpi{font-size:34px;font-weight:900}.pill{display:inline-flex;padding:5px 9px;border-radius:999px;background:#132b45;color:#b9d2ef;margin:3px;font-size:12px;border:1px solid var(--line)}.pill.bad{background:#3b1115;color:#fecaca}.pill.warn{background:#3a2608;color:#fde68a}.pill.ok{background:#0d2f1d;color:#bbf7d0}.list{display:grid;gap:8px}.row{display:flex;gap:8px;justify-content:space-between;align-items:center;padding:10px;border:1px solid var(--line);border-radius:12px;background:#0a1729}.small{font-size:12px;color:var(--muted)}input,select,textarea{width:100%;background:#081629;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px;margin:5px 0}textarea{min-height:80px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.plan,.kitchen3d{position:relative;height:420px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(135deg,#0a182b,#102744);overflow:hidden}.room{position:absolute;border:2px solid #375a82;border-radius:12px;background:rgba(255,255,255,.03)}.eq{position:absolute;display:grid;place-items:center;border:2px solid #14b8a6;background:rgba(20,184,166,.18);color:#eaffff;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;text-align:center;padding:4px}.eq.blocked{border-color:var(--bad);background:rgba(239,68,68,.2)}.eq.warn{border-color:var(--warn);background:rgba(245,158,11,.18)}.cube{position:absolute;width:90px;height:65px;background:linear-gradient(145deg,#1f466a,#0f263f);border:2px solid #4f80aa;border-radius:12px;box-shadow:14px 14px 0 rgba(20,184,166,.18);display:grid;place-items:center;font-weight:900;cursor:pointer}.drawer{position:fixed;right:0;top:0;width:min(520px,94vw);height:100vh;background:#07111f;border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(0,0,0,.45);padding:18px;overflow:auto;transform:translateX(105%);transition:.25s;z-index:5}.drawer.open{transform:translateX(0)}.hide{display:none}.timeline{border-left:3px solid var(--accent);padding-left:14px}.event{margin:0 0 12px;padding:10px;background:#0d1b2f;border:1px solid var(--line);border-radius:12px}.status-open{color:#fca5a5}.status-done{color:#86efac}.status-blocked{color:#fcd34d}@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.span3,.span4,.span5,.span6,.span7,.span8{grid-column:span 12}.top{display:block}.plan,.kitchen3d{height:360px}}
</style></head><body><div class="app"><aside class="side"><div class="brand">KINTA OS</div><div class="ver">v1.0 Daily PM Operating System</div><div class="nav" id="nav"></div><hr style="border-color:var(--line)"><button onclick="exportData()">Export Backup</button><button class="secondary" onclick="document.getElementById('importFile').click()">Import Backup</button><input id="importFile" type="file" accept="application/json" class="hide" onchange="importData(event)"><p class="small">Data saves locally on this iPad/browser.</p></aside><main><div class="top"><div><h1 id="pageTitle">Command Center</h1><p id="pageSub">Real project dashboard, equipment, startup, issues, and build history.</p></div><button onclick="seedDemo()">Reset Demo Data</button></div><section id="view"></section></main></div><div id="drawer" class="drawer"></div><script>
const KEY='kinta_v1_0_data';
const navs=['Command Center','Daily Brief','Projects','Equipment Map','3D Kitchen','Tasks','Startups','Issues','Documents','Warranty','Memory Trail'];let current='Command Center';
const base={projects:[{id:'p1',name:'Wylie - Live Nation Pittsburgh',status:'Active',priority:'High',date:'2026-08-05',notes:'Operational readiness target. Hood/startup/health inspection focus.'},{id:'p2',name:'Galaxy',status:'Active',priority:'High',date:'2026-07-15',notes:'ANSUL waiting on architect/fire marshal question.'}],tasks:[{id:'t1',project:'p1',title:'Return Accurex commissioning checklist',owner:'Rick / GC',due:'2026-07-10',status:'Open',blocked:false},{id:'t2',project:'p1',title:'Confirm LV3 utilities ON for tech scheduling',owner:'PJ Dick / trades',due:'2026-07-11',status:'Open',blocked:false},{id:'t3',project:'p2',title:'Resolve ANSUL architect fire marshal question',owner:'Architect / GC',due:'2026-07-12',status:'Blocked',blocked:true}],equipment:[{id:'e1',project:'p1',item:'H-101',name:'Accurex Hood System',trade:'Mechanical/Electrical/Fire',status:'Startup Pending',warranty:'Pending turnover',x:10,y:12,w:30,h:12,notes:'Checklist required before Accurex tech scheduling.',docs:['Accurex checklist'],photos:[]},{id:'e2',project:'p1',item:'WI-1',name:'Walk-In Cooler/Freezer',trade:'Bova/Fazio',status:'Install Pending',warranty:'Manufacturer',x:55,y:12,w:24,h:20,notes:'Top panels and trim coordination.',docs:['Walk-in drawings'],photos:[]},{id:'e3',project:'p1',item:'IM-1',name:'Ice Machine',trade:'Fazio/Plumbing/Electrical',status:'Blocked',warranty:'Manufacturer ASA',x:58,y:48,w:16,h:12,notes:'MEP readiness dependent.',docs:['Startup sheet'],photos:[]},{id:'e4',project:'p1',item:'DM-1',name:'Dish Machine',trade:'Plumbing/Electrical',status:'Open',warranty:'Manufacturer ASA',x:16,y:55,w:20,h:14,notes:'Verify tables and utilities.',docs:['O&M manual'],photos:[]}],issues:[{id:'i1',project:'p1',title:'ANSUL bottles location verification',owner:'Summit / GC',due:'2026-07-10',status:'Open',history:'Installer reported missing in hood cabinet.'}],startups:[{id:'s1',eq:'e1',checklist:false,utilities:false,scheduled:false,complete:false,blocked:'Checklist not returned'},{id:'s2',eq:'e3',checklist:true,utilities:false,scheduled:false,complete:false,blocked:'MEP connections not complete'}],docs:[{id:'d1',project:'p1',name:'Accurex Hood Commissioning Readiness Checklist',type:'Checklist',link:'',status:'Needed'},{id:'d2',project:'p1',name:'Equipment Installation & Commissioning Schedule',type:'Schedule',link:'',status:'Active'}],history:[{eq:'e1',date:'2026-07-08',title:'GC readiness reviewed',note:'Utilities reported ready; must be ON when techs scheduled.'},{eq:'e1',date:'2026-07-09',title:'Checklist pending',note:'Accurex will not reserve slot until completed checklist is returned.'},{eq:'e2',date:'2026-07-08',title:'Install limit reached',note:'Kitchen progressed as far as possible until Bova returns.'}]};
let data=JSON.parse(localStorage.getItem(KEY)||'null')||base;function save(){localStorage.setItem(KEY,JSON.stringify(data));render()}function byId(a,id){return a.find(x=>x.id===id)}function proj(id){return byId(data.projects,id)?.name||id}function eq(id){return byId(data.equipment,id)}function statusPill(s){let c=s==='Blocked'?'bad':s?.includes('Complete')||s==='Done'?'ok':s?.includes('Pending')?'warn':'';return `<span class="pill ${c}">${s}</span>`}function setView(v){current=v;render()}function renderNav(){nav.innerHTML=navs.map(n=>`<button class="${n==current?'active':''}" onclick="setView('${n}')">${n}</button>`).join('')}function render(){renderNav();pageTitle.textContent=current;const v=document.getElementById('view');v.innerHTML=views[current]()}function todayISO(){return new Date().toISOString().slice(0,10)}function counts(){return{open:data.tasks.filter(t=>t.status!=='Done').length,blocked:data.tasks.filter(t=>t.blocked||t.status==='Blocked').length,issues:data.issues.filter(i=>i.status!=='Done').length,startups:data.startups.filter(s=>!s.complete).length}}
const views={
'Command Center':()=>{let c=counts();return `<div class="grid"><div class="card span3"><div class="small">Open Tasks</div><div class="kpi">${c.open}</div></div><div class="card span3"><div class="small">Blocked</div><div class="kpi">${c.blocked}</div></div><div class="card span3"><div class="small">Open Issues</div><div class="kpi">${c.issues}</div></div><div class="card span3"><div class="small">Startups Pending</div><div class="kpi">${c.startups}</div></div><div class="card span6"><h2>Projects</h2><div class="list">${data.projects.map(p=>`<div class="row"><div><b>${p.name}</b><div class="small">${p.notes}</div></div>${statusPill(p.priority)}</div>`).join('')}</div></div><div class="card span6"><h2>PM Risk Scan</h2>${riskScan()}</div><div class="card span12"><h2>Quick Add Task</h2><div class="grid"><div class="span4"><input id="qt" placeholder="Task title"></div><div class="span3"><input id="qo" placeholder="Owner / trade"></div><div class="span3"><input id="qd" type="date"></div><div class="span2"><button onclick="addTask()">Add</button></div></div></div></div>`},
'Daily Brief':()=>`<div class="grid"><div class="card span6"><h2>Today / Next Actions</h2><div class="list">${data.tasks.filter(t=>t.status!=='Done').map(taskRow).join('')}</div></div><div class="card span6"><h2>Blocked / Waiting</h2>${data.tasks.filter(t=>t.blocked||t.status==='Blocked').map(t=>`<div class="row"><div><b>${t.title}</b><div class="small">Waiting on: ${t.owner} • ${proj(t.project)}</div></div>${statusPill('Blocked')}</div>`).join('')||'<p>No blocked tasks.</p>'}</div><div class="card span12"><h2>What can bite later</h2>${riskScan()}</div></div>`,
'Projects':()=>`<div class="grid"><div class="card span12"><h2>Add Project</h2><input id="pn" placeholder="Project name"><textarea id="pnotes" placeholder="Notes"></textarea><button onclick="addProject()">Add Project</button></div>${data.projects.map(p=>`<div class="card span6"><h2>${p.name}</h2>${statusPill(p.status)} ${statusPill(p.priority)}<p>${p.notes}</p><div class="small">Target: ${p.date||'not set'}</div></div>`).join('')}</div>`,
'Equipment Map':()=>`<div class="grid"><div class="card span8"><h2>Clickable 2D Plan</h2><div class="plan"><div class="room" style="left:5%;top:7%;width:88%;height:82%"></div>${data.equipment.map(e=>`<div class="eq ${e.status==='Blocked'?'blocked':e.status.includes('Pending')?'warn':''}" onclick="openEq('${e.id}')" style="left:${e.x}%;top:${e.y}%;width:${e.w}%;height:${e.h}%">${e.item}<br>${e.name}</div>`).join('')}</div></div><div class="card span4"><h2>Equipment Records</h2><div class="list">${data.equipment.map(e=>`<div class="row" onclick="openEq('${e.id}')"><div><b>${e.item}</b><div class="small">${e.name}</div></div>${statusPill(e.status)}</div>`).join('')}</div></div></div>`,
'3D Kitchen':()=>`<div class="card"><h2>Clickable 3D Mock Kitchen</h2><div class="kitchen3d">${data.equipment.map((e,i)=>`<div class="cube" onclick="openEq('${e.id}')" style="left:${10+i*20}%;top:${20+(i%2)*28}%">${e.item}<br>${e.name.split(' ')[0]}</div>`).join('')}</div><p>This is the v1.0 mock 3D layer. Later versions can replace blocks with true 3D models.</p></div>`,
'Tasks':()=>`<div class="card"><h2>Task Tracker</h2><div class="list">${data.tasks.map(taskRow).join('')}</div></div>`,
'Startups':()=>`<div class="card"><h2>Startup Tracker</h2><div class="list">${data.startups.map(s=>{let e=eq(s.eq);return `<div class="row"><div><b>${e?.item} - ${e?.name}</b><div class="small">Checklist ${s.checklist?'✓':'✗'} • Utilities ${s.utilities?'✓':'✗'} • Scheduled ${s.scheduled?'✓':'✗'} • Complete ${s.complete?'✓':'✗'}</div><div class="small">Blocked: ${s.blocked||'No'}</div></div><button onclick="toggleStartup('${s.id}')">Update</button></div>`}).join('')}</div></div>`,
'Issues':()=>`<div class="grid"><div class="card span12"><h2>Add Issue</h2><input id="it" placeholder="Issue"><input id="io" placeholder="Owner"><button onclick="addIssue()">Add Issue</button></div><div class="card span12"><div class="list">${data.issues.map(i=>`<div class="row"><div><b>${i.title}</b><div class="small">${proj(i.project)} • Owner: ${i.owner} • Due: ${i.due}</div><div class="small">${i.history}</div></div>${statusPill(i.status)}</div>`).join('')}</div></div></div>`,
'Documents':()=>`<div class="card"><h2>Documents / Manual Links</h2><div class="list">${data.docs.map(d=>`<div class="row"><div><b>${d.name}</b><div class="small">${d.type} • ${proj(d.project)} • ${d.status}</div></div><button class="secondary" onclick="editDoc('${d.id}')">Link</button></div>`).join('')}</div></div>`,
'Warranty':()=>`<div class="card"><h2>Warranty Status by Equipment</h2><div class="list">${data.equipment.map(e=>`<div class="row"><div><b>${e.item} - ${e.name}</b><div class="small">${e.warranty} • Responsible: ${e.trade}</div></div>${statusPill(e.status)}</div>`).join('')}</div></div>`,
'Memory Trail':()=>`<div class="card"><h2>Full Build History</h2><div class="timeline">${data.history.map(h=>`<div class="event"><b>${h.date} — ${eq(h.eq)?.item||''} ${h.title}</b><div class="small">${h.note}</div></div>`).join('')}</div></div>`};
function taskRow(t){return `<div class="row"><div><b>${t.title}</b><div class="small">${proj(t.project)} • ${t.owner} • Due ${t.due}</div></div>${statusPill(t.status)}</div>`}function riskScan(){let r=[];data.startups.forEach(s=>{if(!s.complete&&s.blocked)r.push(`Startup blocked for ${eq(s.eq)?.item}: ${s.blocked}`)});data.tasks.filter(t=>t.blocked).forEach(t=>r.push(`Blocked task: ${t.title}`));data.issues.filter(i=>i.status!=='Done').forEach(i=>r.push(`Open issue: ${i.title}`));return r.map(x=>`<div class="row"><span>${x}</span>${statusPill('Watch')}</div>`).join('')||'<p>No major risks found.</p>'}
function openEq(id){let e=eq(id), s=data.startups.find(x=>x.eq===id), hist=data.history.filter(h=>h.eq===id);drawer.innerHTML=`<button class="secondary" onclick="drawer.classList.remove('open')">Close</button><h2>${e.item} - ${e.name}</h2>${statusPill(e.status)}<p>${e.notes}</p><h3>Record</h3><div class="small">Project: ${proj(e.project)}<br>Responsible trade/person: ${e.trade}<br>Warranty: ${e.warranty}</div><h3>Startup Checklist</h3><p>Checklist: ${s?.checklist?'Done':'Needed'}<br>Utilities: ${s?.utilities?'Ready':'Not ready'}<br>Scheduled: ${s?.scheduled?'Yes':'No'}<br>Complete: ${s?.complete?'Yes':'No'}<br>Blocked: ${s?.blocked||'No'}</p><h3>Documents</h3>${(e.docs||[]).map(d=>`<span class="pill">${d}</span>`).join('')}<h3>Add Build History</h3><input id="hd" type="date" value="${todayISO()}"><input id="ht" placeholder="Event title"><textarea id="hn" placeholder="What happened / why it matters"></textarea><button onclick="addHistory('${id}')">Add History</button><h3>Build History</h3><div class="timeline">${hist.map(h=>`<div class="event"><b>${h.date} — ${h.title}</b><div class="small">${h.note}</div></div>`).join('')}</div>`;drawer.classList.add('open')}
function addHistory(id){data.history.unshift({eq:id,date:hd.value,title:ht.value||'Update',note:hn.value||''});save();openEq(id)}function addTask(){data.tasks.push({id:'t'+Date.now(),project:'p1',title:qt.value,owner:qo.value,due:qd.value,status:'Open',blocked:false});save()}function addProject(){data.projects.push({id:'p'+Date.now(),name:pn.value,status:'Active',priority:'Normal',date:'',notes:pnotes.value});save()}function addIssue(){data.issues.push({id:'i'+Date.now(),project:'p1',title:it.value,owner:io.value,due:'',status:'Open',history:''});save()}function toggleStartup(id){let s=byId(data.startups,id);if(!s.checklist)s.checklist=true;else if(!s.utilities)s.utilities=true;else if(!s.scheduled)s.scheduled=true;else s.complete=!s.complete;s.blocked=s.complete?'':s.blocked;save()}function editDoc(id){let d=byId(data.docs,id);let link=prompt('Paste document/manual link',d.link||'');if(link!==null){d.link=link;save()}}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='KINTA_OS_v1_backup.json';a.click()}function importData(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save()};r.readAsText(f)}function seedDemo(){if(confirm('Reset demo data?')){data=structuredClone(base);save()}}if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');render();
</script></body></html>
