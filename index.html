<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KINTA Enterprise 3.1</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#07111f" />
<style>
:root{--bg:#07111f;--panel:#0d1b2e;--panel2:#10233b;--line:#203957;--text:#e9f4ff;--muted:#8aa4bd;--accent:#57d6ff;--ok:#61e294;--warn:#ffd166;--bad:#ff6b6b;--purple:#b197fc}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top right,#17375c,#07111f 45%);font-family:Inter,system-ui,Segoe UI,Arial;color:var(--text)}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:rgba(7,17,31,.92);border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh}.brand{font-weight:900;font-size:24px;letter-spacing:.5px}.ver{color:var(--accent);font-size:12px;margin:2px 0 22px}.nav button{width:100%;background:transparent;color:var(--muted);border:1px solid transparent;padding:12px;border-radius:14px;text-align:left;font-weight:700;margin:3px 0}.nav button.active,.nav button:hover{background:linear-gradient(90deg,#123655,#10233b);color:white;border-color:#244b70}.main{padding:18px 22px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px}.search{flex:1;background:rgba(13,27,46,.85);border:1px solid var(--line);color:white;border-radius:16px;padding:14px 16px}.pill{border:1px solid var(--line);border-radius:999px;padding:10px 13px;background:rgba(13,27,46,.8);color:var(--muted);font-weight:800}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(13,27,46,.86);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.18)}.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}h1,h2,h3{margin:0 0 10px}h1{font-size:30px}.muted{color:var(--muted)}.metric{font-size:34px;font-weight:900}.tag{display:inline-block;padding:6px 9px;border-radius:999px;background:#132f4b;border:1px solid #28577e;color:#b9e8ff;font-size:12px;font-weight:800;margin:3px}.btn{background:linear-gradient(135deg,#27b8ff,#7c4dff);border:none;color:white;border-radius:14px;padding:11px 13px;font-weight:900}.btn.secondary{background:#132842;border:1px solid var(--line);color:#d8eaff}.input,textarea,select{width:100%;padding:11px;border-radius:13px;border:1px solid var(--line);background:#081827;color:white;margin:6px 0}textarea{min-height:82px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.list{display:grid;gap:8px}.item{background:#0a1d31;border:1px solid #1d3a58;border-radius:15px;padding:11px}.status-ok{color:var(--ok)}.status-warn{color:var(--warn)}.status-bad{color:var(--bad)}.plan{position:relative;height:360px;background:linear-gradient(135deg,#0b2238,#091827);border:1px dashed #3d6c93;border-radius:20px;overflow:hidden}.room{position:absolute;border:1px solid #456d91;border-radius:10px;color:#7699b5;padding:6px;font-size:12px}.equip{position:absolute;border:2px solid var(--accent);background:rgba(87,214,255,.13);border-radius:12px;padding:8px;color:white;font-weight:900;cursor:pointer;text-align:center}.equip.risk{border-color:var(--bad);background:rgba(255,107,107,.16)}.equip.warn{border-color:var(--warn);background:rgba(255,209,102,.14)}.cube{height:260px;position:relative;background:linear-gradient(160deg,#091827,#0f2b49);border-radius:20px;border:1px solid #2b4f70;perspective:700px;overflow:hidden}.block{position:absolute;width:96px;height:62px;background:linear-gradient(135deg,#183f61,#0f87bb);border:1px solid #77dfff;border-radius:12px;transform:skewY(-10deg);display:flex;align-items:center;justify-content:center;font-weight:900;cursor:pointer}.timeline{border-left:3px solid #2b557a;margin-left:12px;padding-left:18px}.event{position:relative;margin:0 0 15px}.event:before{content:"";position:absolute;left:-27px;top:3px;width:14px;height:14px;border-radius:50%;background:var(--accent)}.drawer{position:fixed;right:18px;top:18px;bottom:18px;width:390px;background:#081827;border:1px solid #345a7d;border-radius:24px;padding:18px;box-shadow:0 20px 80px rgba(0,0,0,.5);display:none;overflow:auto;z-index:10}.drawer.open{display:block}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{background:#10233b;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:9px 12px;font-weight:800}.tab.active{color:white;background:#17466d;border-color:#3e87ba}.screen{display:none}.screen.active{display:block}.bar{height:10px;background:#10233b;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#61e294,#57d6ff);border-radius:999px}.uploadZone{border:2px dashed #366184;border-radius:18px;padding:18px;text-align:center;background:#091a2b}.mini{font-size:12px;color:var(--muted)}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid{grid-template-columns:1fr}.span3,.span4,.span5,.span6,.span7,.span8,.span12{grid-column:span 1}.drawer{left:10px;right:10px;width:auto}.top{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<div class="app">
<aside class="side"><div class="brand">KINTA</div><div class="ver">Enterprise 3.1 • Import Pipeline</div><div class="nav" id="nav"></div></aside>
<main class="main"><div class="top"><input class="search" id="globalSearch" placeholder="Search projects, equipment, docs, logistics, delivery…"/><span class="pill">Rick PM OS</span><span class="pill" id="clock"></span></div><section id="content"></section></main>
</div>
<div class="drawer" id="drawer"></div>
<script>
const STORE='kinta_enterprise_3_0';
const seed={project:{name:'Wylie / Live Nation Pittsburgh',phase:'Operational Readiness',health:82},
equipment:[
{id:'1054',name:'Rational Combi Oven',level:'Level 3 Kitchen',w:42,h:75,d:38,weight:650,route:'Elevator/hoist review',status:'Install',risk:'warn',startup:['Utilities verified','Gas connected','Water filtration','Drain complete','Startup scheduled'],history:['Submittal approved','Delivered to site','Set under hood','Awaiting utility verification']},
{id:'WI-1',name:'Walk-In Cooler',level:'Level 3 Kitchen',w:96,h:108,d:144,weight:1800,route:'Panels / freight elevator',status:'Panels',risk:'warn',startup:['Panels complete','Refrigeration piping','Electrical complete','Startup complete'],history:['Released','Delivered','Panels in progress']},
{id:'RTU-1',name:'Rooftop Compressor',level:'Roof',w:50,h:45,d:42,weight:720,route:'Crane required',status:'Logistics',risk:'bad',startup:['Crane plan','Roof access','Refrigeration tie-in','Startup'],history:['Released','Crane review required']},
{id:'IM-2',name:'Ice Machine',level:'Level 2 Bar',w:30,h:78,d:34,weight:420,route:'Elevator OK',status:'Delivery',risk:'ok',startup:['Water','Drain','Electrical','Startup'],history:['Inbound','Delivery scheduled']}
],tasks:[{t:'Verify largest door and elevator dimensions for RTU route',p:'High'},{t:'Collect delivery photos for Level 2 bar items',p:'Medium'},{t:'Confirm startup checklist by equipment',p:'High'}],docs:[],photos:[]};
let data=JSON.parse(localStorage.getItem(STORE)||'null')||seed;
function save(){localStorage.setItem(STORE,JSON.stringify(data));}
function $(id){return document.getElementById(id)}
const screens=['Dashboard','Import Wizard','Projects','Digital Kitchen','Equipment Twins','Logistics AI','Delivery Center','Field Mode','Documents','Reports','Settings'];
let current='Dashboard';
function renderNav(){ $('nav').innerHTML=screens.map(s=>`<button class="${s==current?'active':''}" onclick="current='${s}';render()">${s}</button>`).join('') }
function shell(title,body){return `<h1>${title}</h1>${body}`}
function metric(label,val,sub){return `<div class="card span3"><div class="muted">${label}</div><div class="metric">${val}</div><div class="mini">${sub||''}</div></div>`}
function dashboard(){let risk=data.equipment.filter(e=>e.risk!='ok').length; return shell('Enterprise Command Center',`<div class="grid">${metric('Project Health',data.project.health+'%','AI readiness score')}${metric('Equipment Twins',data.equipment.length,'Living equipment records')}${metric('Logistics Risks',risk,'Door / elevator / hoist / crane')}${metric('Open Follow-ups',data.tasks.length,'PM action items')}<div class="card span8"><h2>AI Daily Brief</h2><div class="list"><div class="item"><b>Critical:</b> Rooftop compressor needs crane/access validation before release to delivery.</div><div class="item"><b>Clearance:</b> Large items need route dimensions entered before site arrival.</div><div class="item"><b>Startup:</b> Tie each equipment item to its utility readiness checklist.</div></div></div><div class="card span4"><h2>Readiness</h2><p>Startup</p><div class="bar"><div class="fill" style="width:68%"></div></div><p>Delivery</p><div class="bar"><div class="fill" style="width:54%"></div></div><p>Logistics</p><div class="bar"><div class="fill" style="width:41%"></div></div></div><div class="card span12"><h2>Next Best Actions</h2>${data.tasks.map((x,i)=>`<span class="tag">${x.p}: ${x.t}</span>`).join('')}</div></div>`)}
function importer(){return shell('Project Import Wizard',`<div class="grid"><div class="card span6"><h2>Drop Project Package</h2><div class="uploadZone"><b>Import equipment schedules, drawings, delivery sheets, startup checklists, photos, manuals</b><br><span class="muted">This browser prototype saves file names/notes locally. Future cloud version will parse PDFs, Excel, photos, and emails automatically.</span><input class="input" type="file" multiple onchange="addFiles(this.files)"></div><textarea id="paste" placeholder="Paste equipment schedule rows, delivery notes, or startup checklist text here..."></textarea><button class="btn" onclick="parsePaste()">AI Build Project From Paste</button></div><div class="card span6"><h2>Import Pipeline</h2><div class="timeline"><div class="event"><b>1. Identify project</b><br><span class="muted">Name, location, GC, owner, phase</span></div><div class="event"><b>2. Build equipment twins</b><br><span class="muted">Item, model, dimensions, weight, room</span></div><div class="event"><b>3. Link documents</b><br><span class="muted">Manuals, drawings, checklists, O&M</span></div><div class="event"><b>4. Run Logistics AI</b><br><span class="muted">Doors, elevator, hoist, crane, roof</span></div><div class="event"><b>5. Generate dashboard</b><br><span class="muted">Tasks, risks, delivery, startup</span></div></div></div><div class="card span12"><h2>Imported Files</h2><div class="list">${(data.docs.length?data.docs:['No imported files yet.']).map(d=>`<div class="item">${typeof d==='string'?d:d.name}</div>`).join('')}</div></div></div>`)}
function parsePaste(){let txt=$('paste').value.trim(); if(!txt)return; txt.split('\n').filter(Boolean).slice(0,20).forEach((line,i)=>{data.equipment.push({id:'IMP-'+(data.equipment.length+1),name:line.slice(0,50),level:'Imported',w:0,h:0,d:0,weight:0,route:'Needs logistics data',status:'Imported',risk:'warn',startup:['Review imported data'],history:['Imported from pasted package']})}); save(); render()}
function addFiles(files){[...files].forEach(f=>data.docs.push({name:f.name,size:f.size,type:f.type,date:new Date().toLocaleString()})); save(); render()}
function projects(){return shell('Project Workspace',`<div class="grid"><div class="card span4"><h2>${data.project.name}</h2><p class="muted">${data.project.phase}</p><input class="input" value="${data.project.name}" onchange="data.project.name=this.value;save();render()"><input class="input" value="${data.project.phase}" onchange="data.project.phase=this.value;save();render()"></div><div class="card span8"><h2>Workspace Modules</h2>${['Dashboard','Equipment','Delivery','Digital Kitchen','Startup','Utilities','Punch','Warranty','Photos','Documents','Timeline','AI Brief'].map(x=>`<span class="tag">${x}</span>`).join('')}</div></div>`)}
function digital(){return shell('Digital Kitchen',`<div class="grid"><div class="card span7"><h2>2D Plan View</h2><div class="plan"><div class="room" style="left:18px;top:18px;width:55%;height:70%">Level 3 Kitchen</div><div class="room" style="right:20px;top:35px;width:34%;height:45%">Level 2 Bar</div>${data.equipment.map((e,i)=>`<div class="equip ${e.risk=='bad'?'risk':e.risk=='warn'?'warn':''}" onclick="openTwin('${e.id}')" style="left:${45+(i%3)*145}px;top:${80+Math.floor(i/3)*90}px">${e.id}<br><small>${e.name}</small></div>`).join('')}</div></div><div class="card span5"><h2>3D Mock View</h2><div class="cube">${data.equipment.map((e,i)=>`<div class="block" onclick="openTwin('${e.id}')" style="left:${35+i*78}px;top:${60+(i%2)*85}px">${e.id}</div>`).join('')}</div><p class="muted">Tap any block to open the equipment digital twin.</p></div></div>`)}
function twins(){return shell('Equipment Digital Twins',`<div class="grid"><div class="card span12"><button class="btn" onclick="addEquip()">Add Equipment Twin</button></div>${data.equipment.map(e=>`<div class="card span4"><h2>${e.id}</h2><b>${e.name}</b><p class="muted">${e.level} • ${e.status}</p><span class="tag ${e.risk=='bad'?'status-bad':e.risk=='warn'?'status-warn':'status-ok'}">${e.risk.toUpperCase()}</span><p>${e.w}W × ${e.h}H × ${e.d}D • ${e.weight} lb</p><button class="btn secondary" onclick="openTwin('${e.id}')">Open Twin</button></div>`).join('')}</div>`)}
function addEquip(){let id=prompt('Item number?'); if(!id)return; data.equipment.push({id,name:'New Equipment',level:'Unassigned',w:0,h:0,d:0,weight:0,route:'Needs clearance check',status:'New',risk:'warn',startup:['Review requirements'],history:['Created']}); save(); render()}
function logistics(){return shell('Logistics AI',`<div class="grid"><div class="card span6"><h2>Route Inputs</h2><input id="door" class="input" type="number" placeholder="Smallest door width inches"><input id="elevW" class="input" type="number" placeholder="Elevator width inches"><input id="elevCap" class="input" type="number" placeholder="Elevator capacity lbs"><button class="btn" onclick="runLogistics()">Run Logistics AI</button></div><div class="card span6"><h2>Results</h2><div id="logResults" class="list">${data.equipment.map(e=>logLine(e,36,48,1000)).join('')}</div></div></div>`)}
function logLine(e,door,elev,cap){let flags=[]; if(e.w>door)flags.push('door fail'); if(e.w>elev)flags.push('elevator width'); if(e.weight>cap)flags.push('elevator capacity'); if(/roof|crane/i.test(e.level+' '+e.route))flags.push('crane review'); let cls=flags.length?'status-bad':'status-ok'; return `<div class="item"><b>${e.id} ${e.name}</b><br><span class="${cls}">${flags.length?flags.join(', '):'PASS route check'}</span></div>`}
function runLogistics(){let door=+$('door').value||36,elev=+$('elevW').value||48,cap=+$('elevCap').value||1000; $('logResults').innerHTML=data.equipment.map(e=>logLine(e,door,elev,cap)).join('')}
function delivery(){return shell('Delivery Center',`<div class="grid"><div class="card span5"><h2>Check In Item</h2><select id="delEquip" class="input">${data.equipment.map(e=>`<option>${e.id} - ${e.name}</option>`).join('')}</select><input class="input" id="delStatus" placeholder="Received / damaged / missing / stored at..."><input class="input" type="file" accept="image/*" multiple onchange="photoFiles(this.files)"><button class="btn" onclick="addDeliveryNote()">Save Delivery Note</button></div><div class="card span7"><h2>Delivery Workflow</h2>${['Driver arrives','Photograph crate','Check item number','Inspect damage','Mark missing accessories','Assign storage location','Update equipment twin','Generate delivery report'].map(x=>`<span class="tag">${x}</span>`).join('')}</div></div>`)}
function addDeliveryNote(){let e=$('delEquip').value, note=$('delStatus').value; data.tasks.push({t:`Delivery: ${e} — ${note}`,p:'Medium'}); save(); render()}
function photoFiles(files){[...files].forEach(f=>data.photos.push({name:f.name,date:new Date().toLocaleString()})); save();}
function field(){return shell('Field Mode',`<div class="grid"><div class="card span6"><h2>Quick Field Note</h2><textarea id="fieldNote" placeholder="Voice type or paste site notes..."></textarea><button class="btn" onclick="data.tasks.push({t:document.getElementById('fieldNote').value,p:'Field'});save();render()">Add Follow-up</button></div><div class="card span6"><h2>Fast Buttons</h2>${['Damage photo','Missing item','Utility incomplete','Startup blocked','Punch item','GC follow-up','Owner update','Warranty issue'].map(x=>`<button class="btn secondary" style="margin:5px" onclick="data.tasks.push({t:'${x}',p:'Field'});save();render()">${x}</button>`).join('')}</div></div>`)}
function documents(){return shell('Documents & Photos',`<div class="grid"><div class="card span6"><h2>Documents</h2><input class="input" type="file" multiple onchange="addFiles(this.files)"><div class="list">${data.docs.map(d=>`<div class="item"><b>${d.name}</b><br><span class="muted">${d.type||''} ${d.date||''}</span></div>`).join('')||'<div class="item">No documents yet</div>'}</div></div><div class="card span6"><h2>Photos</h2><input class="input" type="file" accept="image/*" multiple onchange="photoFiles(this.files);render()"><div class="list">${data.photos.map(p=>`<div class="item">${p.name} <span class="muted">${p.date}</span></div>`).join('')||'<div class="item">No photos yet</div>'}</div></div></div>`)}
function reports(){let rep=`KINTA Enterprise 3.1 Report\nProject: ${data.project.name}\nEquipment: ${data.equipment.length}\nTasks: ${data.tasks.length}\nLogistics risks: ${data.equipment.filter(e=>e.risk!='ok').length}\n\nNext Actions:\n${data.tasks.map(t=>'- '+t.t).join('\n')}`;return shell('Reports',`<div class="card"><h2>Copy/Paste PM Report</h2><textarea style="min-height:260px">${rep}</textarea><button class="btn" onclick="navigator.clipboard.writeText(document.querySelector('textarea').value)">Copy Report</button></div>`)}
function settings(){return shell('Settings & Backup',`<div class="grid"><div class="card span6"><h2>Backup</h2><button class="btn" onclick="downloadBackup()">Export KINTA Data</button><input class="input" type="file" accept="application/json" onchange="importBackup(this.files[0])"></div><div class="card span6"><h2>Reset</h2><button class="btn secondary" onclick="if(confirm('Reset local data?')){localStorage.removeItem(STORE);location.reload()}">Reset Prototype Data</button></div></div>`)}
function downloadBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='kinta-backup.json';a.click()}
function importBackup(f){let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save();render()};r.readAsText(f)}
function openTwin(id){let e=data.equipment.find(x=>x.id==id); $('drawer').innerHTML=`<button class="btn secondary" onclick="$('drawer').classList.remove('open')">Close</button><h2>${e.id} — ${e.name}</h2><p class="muted">${e.level} • ${e.status}</p><div class="tabs"><span class="tab active">Twin</span><span class="tab">Logistics</span><span class="tab">Startup</span><span class="tab">History</span></div><h3>Identity</h3><input class="input" value="${e.name}" onchange="e.name=this.value;save();"><input class="input" value="${e.level}" onchange="e.level=this.value;save();"><h3>Dimensions / Weight</h3><div class="row"><input class="input" style="width:31%" type="number" value="${e.w}" onchange="e.w=+this.value;save();" placeholder="W"><input class="input" style="width:31%" type="number" value="${e.h}" onchange="e.h=+this.value;save();" placeholder="H"><input class="input" style="width:31%" type="number" value="${e.d}" onchange="e.d=+this.value;save();" placeholder="D"></div><input class="input" type="number" value="${e.weight}" onchange="e.weight=+this.value;save();" placeholder="Weight"><h3>Logistics AI</h3><div class="item">${e.route}</div><h3>Startup Checklist</h3>${e.startup.map(s=>`<div class="item">☐ ${s}</div>`).join('')}<h3>Build History</h3><div class="timeline">${e.history.map(h=>`<div class="event">${h}</div>`).join('')}</div><input id="hist" class="input" placeholder="Add history event"><button class="btn" onclick="e.history.push(document.getElementById('hist').value);save();openTwin('${e.id}')">Add Event</button>`; $('drawer').classList.add('open')}
function render(){renderNav();let map={Dashboard:dashboard,'Import Wizard':importer,Projects:projects,'Digital Kitchen':digital,'Equipment Twins':twins,'Logistics AI':logistics,'Delivery Center':delivery,'Field Mode':field,Documents:documents,Reports:reports,Settings:settings};$('content').innerHTML=map[current]();}
setInterval(()=>{$('clock').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})},1000);render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>

<script>
(function(){
  const introText = "KINTA-OS Kitchen Intelligence Architecture Operating System created by Rick Medeiros";
  function addIntro(){
    if(document.getElementById('kintaStartupIntro')) return;
    const wrap = document.createElement('div');
    wrap.id = 'kintaStartupIntro';
    wrap.innerHTML = `
      <div style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#07111f,#10233f 55%,#07111f);display:flex;align-items:center;justify-content:center;padding:24px;color:white;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <div style="max-width:760px;width:100%;border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:34px;background:rgba(255,255,255,.08);box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(18px);text-align:center;">
          <div style="font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#9fd3ff;margin-bottom:12px;">System Online</div>
          <div style="font-size:clamp(30px,6vw,62px);font-weight:900;line-height:1.02;margin-bottom:14px;">KINTA-OS</div>
          <div style="font-size:clamp(17px,3vw,28px);font-weight:650;line-height:1.25;margin-bottom:18px;">Kitchen Intelligence Architecture Operating System</div>
          <div style="font-size:16px;color:#d7e8ff;margin-bottom:24px;">Created by <strong>Rick Medeiros</strong></div>
          <button id="kintaEnterBtn" style="appearance:none;border:0;border-radius:999px;padding:13px 24px;font-weight:800;background:white;color:#0c1d33;box-shadow:0 10px 30px rgba(0,0,0,.25);">Enter KINTA</button>
          <div style="font-size:12px;color:#aac6e8;margin-top:18px;">This screen closes automatically.</div>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    const close = () => { wrap.style.opacity='0'; wrap.style.transition='opacity .35s ease'; setTimeout(()=>wrap.remove(), 380); };
    document.getElementById('kintaEnterBtn').addEventListener('click', close);
    setTimeout(close, 4200);

    try {
      if ('speechSynthesis' in window) {
        const speakNow = () => {
          const u = new SpeechSynthesisUtterance(introText);
          u.rate = 0.92;
          u.pitch = 1;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(u);
        };
        speakNow();
        document.getElementById('kintaEnterBtn').addEventListener('click', speakNow, {once:true});
      }
    } catch(e) {}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', addIntro);
  else addIntro();
})();
</script>

</body></html>
